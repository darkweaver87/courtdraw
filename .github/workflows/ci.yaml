name: CI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libxkbcommon-x11-dev \
            libwayland-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev \
            libxfixes-dev \
            libxxf86vm-dev \
            libvulkan-dev

      - name: Run tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...

  build-desktop:
    needs: test
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
            cc: gcc
            archive: tar.gz
          - os: linux
            arch: arm64
            runner: ubuntu-latest
            cc: aarch64-linux-gnu-gcc
            archive: tar.gz
          - os: darwin
            arch: arm64
            runner: macos-latest
            cc: ""
            archive: tar.gz
          - os: darwin
            arch: amd64
            runner: macos-latest
            cc: ""
            archive: tar.gz
          - os: windows
            arch: amd64
            runner: windows-latest
            cc: gcc
            archive: zip
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Linux dependencies
        if: matrix.os == 'linux' && matrix.arch == 'amd64'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libxkbcommon-x11-dev \
            libwayland-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev \
            libxfixes-dev \
            libxxf86vm-dev \
            libvulkan-dev

      - name: Install Linux arm64 cross-compilation dependencies
        if: matrix.os == 'linux' && matrix.arch == 'arm64'
        run: |
          sudo dpkg --add-architecture arm64
          # Pin all existing sources to amd64 only
          # Remove non-Ubuntu sources that don't carry arm64 packages
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list
          # .list files: add [arch=amd64] only to bare "deb " lines (skip those already with [...])
          for f in /etc/apt/sources.list.d/*.list; do
            [ -f "$f" ] && sudo sed -i '/^deb \[/!s/^deb /deb [arch=amd64] /' "$f" 2>/dev/null || true
          done
          # .sources files: add Architectures if missing
          for f in /etc/apt/sources.list.d/*.sources; do
            [ -f "$f" ] && grep -q '^Architectures:' "$f" || sudo sed -i '/^Types:/a Architectures: amd64' "$f" 2>/dev/null || true
          done
          # Add arm64 ports
          cat <<'SOURCES' | sudo tee /etc/apt/sources.list.d/arm64-ports.sources
          Types: deb
          URIs: http://ports.ubuntu.com/
          Suites: noble noble-updates
          Components: main restricted universe multiverse
          Architectures: arm64
          SOURCES
          sudo sed -i 's/^          //' /etc/apt/sources.list.d/arm64-ports.sources
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            libgl1-mesa-dev:arm64 \
            libegl1-mesa-dev:arm64 \
            libxkbcommon-x11-dev:arm64 \
            libwayland-dev:arm64 \
            libx11-dev:arm64 \
            libx11-xcb-dev:arm64 \
            libxcursor-dev:arm64 \
            libxrandr-dev:arm64 \
            libxinerama-dev:arm64 \
            libxi-dev:arm64 \
            libxfixes-dev:arm64 \
            libxxf86vm-dev:arm64 \
            libvulkan-dev:arm64

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "1"
          CC: ${{ matrix.cc }}
          PKG_CONFIG_PATH: ${{ matrix.os == 'linux' && matrix.arch == 'arm64' && '/usr/lib/aarch64-linux-gnu/pkgconfig' || '' }}
        run: |
          binary=courtdraw
          if [ "${{ matrix.os }}" = "windows" ]; then
            binary=courtdraw.exe
          fi
          go build -o "${binary}" ./cmd/courtdraw
        shell: bash

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p dist/courtdraw
          binary=courtdraw
          cp "${binary}" dist/courtdraw/
          cp -r library dist/courtdraw/ 2>/dev/null || true
          cd dist
          tar czf "courtdraw-${{ matrix.os }}-${{ matrix.arch }}.tar.gz" courtdraw/
        shell: bash

      - name: Package (zip)
        if: matrix.archive == 'zip'
        run: |
          mkdir -p dist/courtdraw
          cp courtdraw.exe dist/courtdraw/
          cp -r library dist/courtdraw/ 2>/dev/null || true
          cd dist
          7z a "courtdraw-${{ matrix.os }}-${{ matrix.arch }}.zip" courtdraw/
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: courtdraw-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/courtdraw-${{ matrix.os }}-${{ matrix.arch }}.*

  build-android:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libxkbcommon-x11-dev \
            libwayland-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev \
            libxfixes-dev \
            libxxf86vm-dev \
            libvulkan-dev

      - name: Install gogio
        run: go install gioui.org/cmd/gogio@v0.9.0

      - name: Build Android APK
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}
        run: gogio -target android -appid com.darkweaver87.courtdraw ./cmd/courtdraw

      - name: Rename APK
        run: mv courtdraw.apk courtdraw-android.apk

      - uses: actions/upload-artifact@v4
        with:
          name: courtdraw-android
          path: courtdraw-android.apk

  release:
    needs: [build-desktop, build-android]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Collect release assets
        run: |
          mkdir -p release
          find artifacts/ -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.apk" \) -exec cp {} release/ \;
          ls -la release/

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
