name: CI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libxkbcommon-x11-dev \
            libwayland-dev \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev \
            libxxf86vm-dev \
            libvulkan-dev

      - name: Run tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...

  build-desktop:
    needs: test
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
            cc: gcc
            archive: tar.gz
          - os: linux
            arch: arm64
            runner: ubuntu-latest
            cc: aarch64-linux-gnu-gcc
            archive: tar.gz
          - os: darwin
            arch: arm64
            runner: macos-latest
            cc: ""
            archive: tar.gz
          - os: darwin
            arch: amd64
            runner: macos-latest
            cc: ""
            archive: tar.gz
          - os: windows
            arch: amd64
            runner: windows-latest
            cc: gcc
            archive: zip
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Linux dependencies
        if: matrix.os == 'linux' && matrix.arch == 'amd64'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libxkbcommon-x11-dev \
            libwayland-dev \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev \
            libxxf86vm-dev \
            libvulkan-dev

      - name: Install Linux arm64 cross-compilation dependencies
        if: matrix.os == 'linux' && matrix.arch == 'arm64'
        run: |
          sudo dpkg --add-architecture arm64
          # Add arm64 sources
          sudo sed -i 's/^deb /deb [arch=amd64] /' /etc/apt/sources.list.d/*.list 2>/dev/null || true
          echo "deb [arch=arm64] http://ports.ubuntu.com/ $(lsb_release -cs) main restricted universe multiverse" | sudo tee /etc/apt/sources.list.d/arm64.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ $(lsb_release -cs)-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/arm64.list
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            libgl1-mesa-dev:arm64 \
            libxkbcommon-x11-dev:arm64 \
            libwayland-dev:arm64 \
            libx11-dev:arm64 \
            libxcursor-dev:arm64 \
            libxrandr-dev:arm64 \
            libxinerama-dev:arm64 \
            libxi-dev:arm64 \
            libxxf86vm-dev:arm64 \
            libvulkan-dev:arm64

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "1"
          CC: ${{ matrix.cc }}
        run: |
          binary=courtdraw
          if [ "${{ matrix.os }}" = "windows" ]; then
            binary=courtdraw.exe
          fi
          go build -o "${binary}" ./cmd/courtdraw
        shell: bash

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p dist/courtdraw
          binary=courtdraw
          cp "${binary}" dist/courtdraw/
          cp -r library dist/courtdraw/ 2>/dev/null || true
          cd dist
          tar czf "courtdraw-${{ matrix.os }}-${{ matrix.arch }}.tar.gz" courtdraw/
        shell: bash

      - name: Package (zip)
        if: matrix.archive == 'zip'
        run: |
          mkdir -p dist/courtdraw
          cp courtdraw.exe dist/courtdraw/
          cp -r library dist/courtdraw/ 2>/dev/null || true
          cd dist
          7z a "courtdraw-${{ matrix.os }}-${{ matrix.arch }}.zip" courtdraw/
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: courtdraw-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/courtdraw-${{ matrix.os }}-${{ matrix.arch }}.*

  build-android:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libxkbcommon-x11-dev \
            libwayland-dev \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev \
            libxxf86vm-dev \
            libvulkan-dev

      - name: Install gogio
        run: go install gioui.org/cmd/gogio@v0.9.0

      - name: Build Android APK
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}
        run: gogio -target android -appid com.darkweaver87.courtdraw ./cmd/courtdraw

      - name: Rename APK
        run: mv courtdraw.apk courtdraw-android.apk

      - uses: actions/upload-artifact@v4
        with:
          name: courtdraw-android
          path: courtdraw-android.apk

  release:
    needs: [build-desktop, build-android]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Collect release assets
        run: |
          mkdir -p release
          find artifacts/ -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.apk" \) -exec cp {} release/ \;
          ls -la release/

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
