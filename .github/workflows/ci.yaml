name: CI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libxkbcommon-x11-dev \
            libwayland-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev \
            libxfixes-dev \
            libxxf86vm-dev \
            libvulkan-dev

      - name: Run tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...

  build-desktop:
    needs: test
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
            cc: gcc
          - os: linux
            arch: arm64
            runner: ubuntu-latest
            cc: aarch64-linux-gnu-gcc
          - os: darwin
            arch: arm64
            runner: macos-latest
            cc: ""
          - os: darwin
            arch: amd64
            runner: macos-latest
            cc: ""
          - os: windows
            arch: amd64
            runner: windows-latest
            cc: gcc
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Linux dependencies
        if: matrix.os == 'linux' && matrix.arch == 'amd64'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libxkbcommon-x11-dev \
            libwayland-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev \
            libxfixes-dev \
            libxxf86vm-dev \
            libvulkan-dev

      - name: Install Linux arm64 cross-compilation dependencies
        if: matrix.os == 'linux' && matrix.arch == 'arm64'
        run: |
          sudo dpkg --add-architecture arm64
          # Pin all existing sources to amd64 only
          # Remove non-Ubuntu sources that don't carry arm64 packages
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list
          # .list files: add [arch=amd64] only to bare "deb " lines (skip those already with [...])
          for f in /etc/apt/sources.list.d/*.list; do
            [ -f "$f" ] && sudo sed -i '/^deb \[/!s/^deb /deb [arch=amd64] /' "$f" 2>/dev/null || true
          done
          # .sources files: add Architectures if missing
          for f in /etc/apt/sources.list.d/*.sources; do
            [ -f "$f" ] && grep -q '^Architectures:' "$f" || sudo sed -i '/^Types:/a Architectures: amd64' "$f" 2>/dev/null || true
          done
          # Add arm64 ports
          cat <<'SOURCES' | sudo tee /etc/apt/sources.list.d/arm64-ports.sources
          Types: deb
          URIs: http://ports.ubuntu.com/
          Suites: noble noble-updates
          Components: main restricted universe multiverse
          Architectures: arm64
          SOURCES
          sudo sed -i 's/^          //' /etc/apt/sources.list.d/arm64-ports.sources
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            libgl1-mesa-dev:arm64 \
            libegl1-mesa-dev:arm64 \
            libxkbcommon-x11-dev:arm64 \
            libwayland-dev:arm64 \
            libx11-dev:arm64 \
            libx11-xcb-dev:arm64 \
            libxcursor-dev:arm64 \
            libxrandr-dev:arm64 \
            libxinerama-dev:arm64 \
            libxi-dev:arm64 \
            libxfixes-dev:arm64 \
            libxxf86vm-dev:arm64 \
            libvulkan-dev:arm64

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "1"
          CC: ${{ matrix.cc }}
          PKG_CONFIG_PATH: ${{ matrix.os == 'linux' && matrix.arch == 'arm64' && '/usr/lib/aarch64-linux-gnu/pkgconfig' || '' }}
        run: |
          binary=courtdraw
          if [ "${{ matrix.os }}" = "windows" ]; then
            binary=courtdraw.exe
          fi
          go build -o "${binary}" ./cmd/courtdraw
        shell: bash

      - name: Rename binary
        if: matrix.os != 'windows'
        run: |
          chmod +x courtdraw
          mv courtdraw "courtdraw-${{ matrix.os }}-${{ matrix.arch }}"
        shell: bash

      - name: Download Mesa3D software OpenGL (Windows)
        if: matrix.os == 'windows'
        run: |
          curl -sL "https://github.com/pal1000/mesa-dist-win/releases/download/25.3.6/mesa3d-25.3.6-release-msvc.7z" -o mesa.7z
          7z x mesa.7z x64/opengl32.dll x64/libgallium_wgl.dll x64/libEGL.dll
        shell: bash

      - name: Package Windows zip
        if: matrix.os == 'windows'
        run: |
          mkdir -p dist/courtdraw
          cp courtdraw.exe dist/courtdraw/
          cp x64/opengl32.dll x64/libgallium_wgl.dll x64/libEGL.dll dist/courtdraw/
          printf '@echo off\r\nset GALLIUM_DRIVER=llvmpipe\r\nset MESA_GL_VERSION_OVERRIDE=2.1\r\nset LIBGL_ALWAYS_SOFTWARE=1\r\n"%%~dp0courtdraw.exe" %%*\r\n' > dist/courtdraw/courtdraw-mesa.bat
          cd dist
          7z a "courtdraw-${{ matrix.os }}-${{ matrix.arch }}.zip" courtdraw/
        shell: bash

      - uses: actions/upload-artifact@v4
        if: matrix.os != 'windows'
        with:
          name: courtdraw-${{ matrix.os }}-${{ matrix.arch }}
          path: courtdraw-${{ matrix.os }}-${{ matrix.arch }}

      - uses: actions/upload-artifact@v4
        if: matrix.os == 'windows'
        with:
          name: courtdraw-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/courtdraw-${{ matrix.os }}-${{ matrix.arch }}.zip

  build-android:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install fyne-cross
        run: go install github.com/fyne-io/fyne-cross@latest

      - name: Build Android APK
        run: |
          fyne-cross android -app-id com.darkweaver87.courtdraw ./cmd/courtdraw
          cp fyne-cross/dist/android/*.apk courtdraw-android.apk

      - uses: actions/upload-artifact@v4
        with:
          name: courtdraw-android
          path: courtdraw-android.apk

  release:
    needs: [build-desktop, build-android]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Collect release assets
        run: |
          mkdir -p release
          find artifacts/ -type f \( -name "courtdraw-*" -o -name "*.zip" -o -name "*.apk" \) -exec cp {} release/ \;
          chmod +x release/courtdraw-linux-* release/courtdraw-darwin-* 2>/dev/null || true
          ls -la release/

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
