version: "2"

linters:
  default: all
  disable:
    # Redundant with gocyclo
    - cyclop
    - gocognit
    - maintidx

    # Too opinionated / noisy for this project
    - funlen           # long functions are fine in UI code
    - lll              # long lines are fine
    - wsl              # whitespace style too strict
    - godot            # comment periods not enforced
    - godox            # TODO/FIXME comments are useful
    - gochecknoglobals # globals are standard in Fyne UI code
    - gochecknoinits   # init() is standard in Go
    - exhaustruct      # requiring all struct fields is too verbose
    - ireturn          # returning interfaces is fine
    - varnamelen       # short var names are idiomatic Go
    - nonamedreturns   # named returns are fine
    - nlreturn         # blank line before return is noise
    - wrapcheck        # wrapping every error is overkill for an app
    - err113           # sentinel errors everywhere is overkill
    - forcetypeassert  # Fyne widget casts are safe in practice
    - tagliatelle      # YAML tag style is project-specific
    - tagalign         # tag alignment is cosmetic
    - testpackage      # _test package separation not needed
    - paralleltest     # not all tests benefit from t.Parallel()
    - tparallel        # same
    - testableexamples # no example tests
    - thelper          # test helper annotation not critical
    - containedctx     # context in struct is fine for UI state
    - contextcheck     # too many false positives with Fyne
    - depguard         # no import restrictions needed
    - gomoddirectives  # no module directive restrictions
    - gomodguard       # no module guard restrictions
    - goheader         # no file headers required
    - interfacebloat   # large interfaces are fine for UI contracts
    - inamedparam      # unnamed params are fine
    - makezero         # not relevant
    - musttag          # struct tag validation not needed
    - promlinter       # no Prometheus metrics
    - spancheck        # no OpenTelemetry spans
    - zerologlint      # no zerolog
    - loggercheck      # no structured logger
    - gosmopolitan     # i18n handled by internal/i18n package
    - dupword          # too many false positives in comments
    - exhaustive       # enum exhaustiveness too strict for Fyne
    - gocheckcompilerdirectives # not needed
    - gochecksumtype   # no sum types
    - grouper          # declaration grouping is project preference
    - importas         # import aliases are fine as-is
    - decorder         # declaration order is cosmetic
    - dogsled          # multiple blanks are fine
    - goprintffuncname # printf func naming not critical
    - canonicalheader  # no HTTP headers in this app
    - ginkgolinter     # no Ginkgo tests
    - asasalint        # variadic any check not relevant
    - noctx            # no HTTP client context enforcement needed
    - nakedret         # naked returns are fine in short functions
    - mnd              # magic numbers are pervasive in UI layout code
    - dupl             # duplicate code detection too strict for similar UI builders
    - gocritic         # too opinionated (ifElseChain, hugeParam, etc.)
    - errorlint        # error wrapping checks too strict for app-level code
    - predeclared      # shadowing predeclared identifiers is fine (e.g. copy, len)
    - bidichk          # no bidirectional text concerns
    - revive           # too many opinionated rules
    - forbidigo        # no forbidden identifiers
    - fatcontext       # no context in loops concern
    - exptostd         # no x/exp usage to migrate
    - errchkjson       # JSON encoding errors not critical
    - asciicheck       # non-ASCII identifiers are fine (French comments)
    - usetesting       # t.Setenv etc. not critical
    - recvcheck        # mixed receivers on slice types is idiomatic Go
    - funcorder        # function ordering is project preference (UI code has logical grouping)
    - wsl_v5           # v2 replacement for wsl — same rationale
    - noinlineerr      # same whitespace style camp as wsl/nlreturn
    - gosec            # panics on Go 1.26 with golangci-lint v2.10.1

  settings:
    gocyclo:
      min-complexity: 30

    nestif:
      min-complexity: 8

    goconst:
      min-len: 3
      min-occurrences: 3

    govet:
      enable-all: true
      disable:
        - fieldalignment # too noisy for UI code

    errcheck:
      check-type-assertions: true

    gosec:
      excludes:
        - G101  # false positives on variable names like "token"
        - G304  # file inclusion via variable (expected for file-based app)

    misspell:
      locale: US

    unparam:
      check-exported: false

    staticcheck:
      checks:
        - all
        - -SA1019  # deprecated usage (handle separately)

  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # Test files: relax some linters
      - path: _test\.go
        linters:
          - goconst
          - gosec
          - unparam
          - errcheck
          - gocritic
          - dupl

      # Main entry point
      - path: cmd/
        linters:
          - gocyclo
    paths:
      - vendor
      - fyne-cross
      - third_party$
      - builtin$
      - examples$

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
