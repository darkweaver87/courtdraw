name: "Transition Layup 1v0 to 3v1"
description: "8 players minimum, 2 balls. Attacker goes 1v0 for a layup, then 3 defenders in transition chase back to defend 3v1. The return is a 3v1 fast break with mandatory layup finish."
court_type: full_court
court_standard: fiba
duration: 12m
intensity: 3
category: offense
tags:
  - layup
  - transition
  - fast-break
  - 1v0
  - 3v1

sequences:
  - label: "Setup"
    ball_carrier: a1
    instructions:
      - "8 players minimum, 2 balls"
      - "1 attacker with ball on each baseline"
      - "3 defenders on each side positioned at half-court"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.50, 0.92]
      - id: d1
        label: "X1"
        role: defender
        position: [0.15, 0.50]
      - id: d2
        label: "X2"
        role: defender
        position: [0.50, 0.50]
      - id: d3
        label: "X3"
        role: defender
        position: [0.85, 0.50]
      - id: qa
        label: "A"
        role: attacker
        type: queue
        count: 3
        position: [0.50, 0.97]
    accessories: []
    actions: []

  - label: "1v0 Layup"
    ball_carrier: a1
    instructions:
      - "Attacker goes 1v0, dribbles to the other basket"
      - "Must score a layup"
      - "3 defenders in transition chase back"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.50, 0.15]
      - id: d1
        label: "X1"
        role: defender
        position: [0.25, 0.25]
      - id: d2
        label: "X2"
        role: defender
        position: [0.50, 0.20]
      - id: d3
        label: "X3"
        role: defender
        position: [0.75, 0.25]
    accessories: []
    actions:
      - type: dribble
        from: a1
        to: [0.50, 0.15]
      - type: shot_layup
        from: a1
        to: [0.50, 0.05]

  - label: "3v1 Return"
    ball_carrier: d1
    instructions:
      - "After the 1v0 layup, the 3 defenders grab the ball"
      - "They return 3v1 against the original attacker"
      - "Must finish with a layup"
      - "The attacker who shot becomes the lone defender"
    players:
      - id: a1
        label: "A"
        role: defender
        position: [0.50, 0.65]
      - id: d1
        label: "X1"
        role: attacker
        position: [0.25, 0.80]
      - id: d2
        label: "X2"
        role: attacker
        position: [0.50, 0.85]
      - id: d3
        label: "X3"
        role: attacker
        position: [0.75, 0.80]
    accessories: []
    actions:
      - type: pass
        from: d1
        to: d2
      - type: shot_layup
        from: d2
        to: [0.50, 0.95]

i18n:
  fr:
    name: "Transition tir en course 1c0 a 3c1"
    description: "8 joueurs minimum, 2 ballons. L'attaquant va en 1c0 pour un tir en course, puis 3 defenseurs en transition reviennent pour defendre en 3c1. Le retour est une montee rapide 3c1 avec obligation de finir en tir en course."
    tags:
      - tir-en-course
      - transition
      - montee-rapide
      - 1c0
      - 3c1
    sequences:
      - label: "Mise en place"
        instructions:
          - "8 joueurs minimum, 2 ballons"
          - "1 attaquant avec ballon sur chaque ligne de fond"
          - "3 defenseurs de chaque cote au milieu de terrain"
      - label: "1c0 Tir en course"
        instructions:
          - "L'attaquant monte en 1c0, dribble vers l'autre panier"
          - "Doit marquer en tir en course"
          - "Les 3 defenseurs en transition reviennent"
      - label: "Retour 3c1"
        instructions:
          - "Apres le 1c0, les 3 defenseurs recuperent le ballon"
          - "Ils repartent en 3c1 contre l'attaquant initial"
          - "Doivent finir en tir en course"
          - "L'attaquant qui a tire devient le defenseur seul"
