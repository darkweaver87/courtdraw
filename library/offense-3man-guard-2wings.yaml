name: "3-Man Game: Guard + 2 Wings"
description: "3 players (1 guard, 2 wings). Pass & go continuity with back screens and ball screens. 1 passes to 2, cuts through. 3 fills the space. Continuous rotation with options for back screen, pick & roll, and handoff. Develops 3-player offensive flow."
court_type: half_court
court_standard: fiba
duration: 15m
intensity: 3
category: offense
tags:
  - three-man-game
  - continuity
  - pass-and-go
  - screens
  - team-offense

sequences:
  - label: "Setup"
    ball_carrier: a1
    instructions:
      - "Guard (1) with ball at top of key"
      - "Wing (2) on the right wing"
      - "Wing (3) on the left wing"
      - "Start without defenders"
    players:
      - id: a1
        label: "1"
        role: attacker
        position: [0.50, 0.55]
      - id: a2
        label: "2"
        role: attacker
        position: [0.80, 0.40]
      - id: a3
        label: "3"
        role: attacker
        position: [0.20, 0.40]
    accessories: []
    actions: []

  - label: "Pass & Go Continuity"
    ball_carrier: a2
    instructions:
      - "1 passes to 2 and cuts to the basket"
      - "3 fakes screen, fills the space left by 1"
      - "If 1 doesn't receive, exits to opposite wing"
      - "2 passes to 3 and cuts through"
      - "1 fills behind — continuous rotation"
      - "Key: always cut after passing"
    players:
      - id: a1
        label: "1"
        role: attacker
        position: [0.20, 0.35]
      - id: a2
        label: "2"
        role: attacker
        position: [0.80, 0.40]
      - id: a3
        label: "3"
        role: attacker
        position: [0.50, 0.50]
    accessories: []
    actions:
      - type: pass
        from: a1
        to: a2
      - type: cut
        from: a1
        to: [0.20, 0.35]

  - label: "Back Screen Option"
    ball_carrier: a2
    instructions:
      - "1 passes to 2 and sets a back screen for 3"
      - "3 uses the screen to cut to basket (back-door)"
      - "2 reads the cut: pass to 3 if open"
      - "After screen, 1 pops out to the ball"
      - "Add defenders to practice all reads"
      - "Variant: 1 sets ball screen for 2 instead"
    players:
      - id: a1
        label: "1"
        role: attacker
        position: [0.30, 0.35]
      - id: a2
        label: "2"
        role: attacker
        position: [0.80, 0.40]
      - id: a3
        label: "3"
        role: attacker
        position: [0.35, 0.20]
    accessories: []
    actions:
      - type: screen
        from: a1
        to: [0.30, 0.35]
      - type: cut
        from: a3
        to: [0.50, 0.10]
      - type: pass
        from: a2
        to: a3
      - type: shot_layup
        from: a3
        to: [0.50, 0.05]

i18n:
  fr:
    name: "Jeu a 3 : meneur + 2 ailiers"
    description: "3 joueurs (1 meneur, 2 ailiers). Passe et va en continuite avec ecrans inverses et ecrans directs. 1 passe a 2, coupe. 3 remplit l'espace. Rotation continue avec options d'ecran inverse, pick & roll et main a main. Travail du jeu offensif a 3 joueurs."
    tags:
      - jeu-a-trois
      - continuite
      - passe-et-va
      - ecrans
      - jeu-collectif
    sequences:
      - label: "Mise en place"
        instructions:
          - "Meneur (1) avec ballon en tete de raquette"
          - "Ailier (2) sur l'aile droite"
          - "Ailier (3) sur l'aile gauche"
          - "Commencer sans defenseurs"
      - label: "Passe et va en continuite"
        instructions:
          - "1 passe a 2 et coupe au panier"
          - "3 feinte l'ecran, remplit l'espace libere par 1"
          - "Si 1 ne recoit pas, ressort a l'aile opposee"
          - "2 passe a 3 et coupe"
          - "1 remplit derriere — rotation continue"
          - "Cle : toujours couper apres avoir passe"
      - label: "Option ecran inverse"
        instructions:
          - "1 passe a 2 et pose un ecran inverse pour 3"
          - "3 utilise l'ecran pour couper au panier (back-door)"
          - "2 lit la coupe : passe a 3 si ouvert"
          - "Apres l'ecran, 1 s'ouvre au ballon"
          - "Ajouter des defenseurs pour pratiquer toutes les lectures"
          - "Variante : 1 pose un ecran direct pour 2 a la place"
