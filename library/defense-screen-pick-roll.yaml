name: "Defense on Pick & Roll"
description: "2 attackers, 2 defenders, 1 ball. A passes to B and sets a ball screen. B uses the screen for pick & roll. Defenders practice all 6 screen defense options: help & recover, go over, switch, slide under, hedge, trap. Series of 3 then rotate."
court_type: half_court
court_standard: fiba
duration: 12m
intensity: 4
category: defense
tags:
  - defense
  - pick-and-roll
  - screen-defense
  - switching
  - team-defense

sequences:
  - label: "Setup"
    ball_carrier: a1
    instructions:
      - "A with ball at top of key"
      - "B at the wing/elbow area"
      - "D1 defends A, D2 defends B"
      - "A passes to B, then goes to set a ball screen for B"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.50, 0.55]
      - id: b1
        label: "B"
        role: attacker
        position: [0.70, 0.40]
      - id: d1
        label: "D1"
        role: defender
        position: [0.48, 0.50]
      - id: d2
        label: "D2"
        role: defender
        position: [0.68, 0.38]
    accessories: []
    actions: []

  - label: "Pick & Roll Action"
    ball_carrier: b1
    instructions:
      - "A sets ball screen on D2 (B's defender)"
      - "B uses the screen and attacks"
      - "A rolls to the basket after screening"
      - "Coach specifies defensive option before each rep:"
      - "1. Help & recover: D1 shows then D2 recovers"
      - "2. Go over: D2 fights over the screen"
      - "3. Switch: D1 takes B, D2 takes A"
      - "4. Under: D2 goes under the screen"
      - "5. Hedge: D1 jumps out high then recovers"
      - "6. Trap: D1+D2 double team B"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.60, 0.38]
      - id: b1
        label: "B"
        role: attacker
        position: [0.55, 0.30]
      - id: d1
        label: "D1"
        role: defender
        position: [0.55, 0.35]
      - id: d2
        label: "D2"
        role: defender
        position: [0.58, 0.32]
    accessories: []
    actions:
      - type: screen
        from: a1
        to: [0.60, 0.38]
      - type: dribble
        from: b1
        to: [0.55, 0.30]

  - label: "Live Play"
    ball_carrier: b1
    instructions:
      - "Play live after the screen"
      - "B reads the defense and reacts"
      - "If trapped: B passes to A rolling"
      - "If hedge: B retreats and waits"
      - "3 reps per defensive option, then rotate"
      - "Progression: add a 3rd attacker for kick-out"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.55, 0.15]
      - id: b1
        label: "B"
        role: attacker
        position: [0.50, 0.25]
      - id: d1
        label: "D1"
        role: defender
        position: [0.52, 0.18]
      - id: d2
        label: "D2"
        role: defender
        position: [0.48, 0.28]
    accessories: []
    actions:
      - type: pass
        from: b1
        to: a1
      - type: shot_layup
        from: a1
        to: [0.50, 0.05]

i18n:
  fr:
    name: "Defense sur pick & roll"
    description: "2 attaquants, 2 defenseurs, 1 ballon. A passe a B et pose un ecran direct. B utilise l'ecran pour le pick & roll. Les defenseurs pratiquent les 6 options de defense sur ecran : aider-reprendre, passer par-dessus, changer, glisser par-dessous, hedger, trapper. Series de 3 puis rotation."
    tags:
      - defense
      - pick-and-roll
      - defense-sur-ecran
      - changement
      - defense-collective
    sequences:
      - label: "Mise en place"
        instructions:
          - "A avec ballon en tete de raquette"
          - "B au coude/aile"
          - "D1 defend A, D2 defend B"
          - "A passe a B, puis va poser un ecran direct pour B"
      - label: "Action pick & roll"
        instructions:
          - "A pose un ecran direct sur D2 (defenseur de B)"
          - "B utilise l'ecran et attaque"
          - "A roule au panier apres l'ecran"
          - "Le coach precise l'option defensive avant chaque repetition :"
          - "1. Aider-reprendre : D1 montre puis D2 recupere"
          - "2. Passer par-dessus : D2 lutte par-dessus l'ecran"
          - "3. Changer : D1 prend B, D2 prend A"
          - "4. Par-dessous : D2 passe sous l'ecran"
          - "5. Hedge : D1 sort haut puis recupere"
          - "6. Trapper : D1+D2 font prise a deux sur B"
      - label: "Jeu libre"
        instructions:
          - "Jouer en live apres l'ecran"
          - "B lit la defense et reagit"
          - "Si trappe : B passe a A qui roule"
          - "Si hedge : B recule et attend"
          - "3 repetitions par option defensive, puis rotation"
          - "Progression : ajouter un 3eme attaquant pour la sortie de balle"
