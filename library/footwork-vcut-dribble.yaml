name: "Footwork: V-Cut & Dribble Moves"
description: "Two footwork drills. First: V-cut getting open — A dribbles to 3-point line, triple threat, V-cut or back-door, B passes to A who shoots on the move. Second: dribble footwork — A dribbles to paint entry then exits behind 3-point line face-to-circle, B sprints to circle and stops basket-to-basket axis, A passes to B who cuts to basket then passes back to A in restricted area for the shot. Develops footwork quality in offensive moves."
court_type: half_court
court_standard: fiba
duration: 10m
intensity: 3
category: offense
tags:
  - footwork
  - v-cut
  - dribble
  - shooting
  - getting-open

sequences:
  - label: "V-Cut Getting Open"
    ball_carrier: a1
    instructions:
      - "2 columns, 1 ball per pair"
      - "A dribbles to the 3-point line, stops in triple threat"
      - "B sprints to high post, stops, receives ball"
      - "A performs V-cut or back-door cut"
      - "B passes to A who shoots on the move"
      - "Rotation: players return on the outside, switch roles"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.20, 0.55]
      - id: b1
        label: "B"
        role: attacker
        position: [0.40, 0.55]
    accessories: []
    actions:
      - type: dribble
        from: a1
        to: [0.20, 0.40]
      - type: pass
        from: a1
        to: b1

  - label: "Dribble Footwork"
    ball_carrier: a1
    instructions:
      - "2 columns, 1 ball per pair"
      - "A dribbles to paint entry, exits behind 3-point line facing circle"
      - "B sprints under circle, stops on basket-to-basket axis"
      - "A stops, passes to B"
      - "B cuts to basket, passes back to A"
      - "A catches in restricted area and shoots"
      - "Footwork: alternate between alternate and simultaneous stops"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.20, 0.55]
      - id: b1
        label: "B"
        role: attacker
        position: [0.40, 0.55]
    accessories: []
    actions:
      - type: dribble
        from: a1
        to: [0.35, 0.30]
      - type: pass
        from: a1
        to: b1
      - type: cut
        from: b1
        to: [0.50, 0.15]

i18n:
  fr:
    name: "Appuis : demarquage en V et dribble"
    description: "Deux exercices d'appuis. Premier : demarquage en V — A dribble jusqu'a la ligne des 3 points, position de triple menace, demarquage en V ou en back-door, B passe a A qui tire en course. Deuxieme : appuis dans le dribble — A dribble jusqu'a l'entree de la zone reservee puis ressort derriere la ligne des 3 points face au cercle, B sprinte sous le cercle et s'arrete dans l'axe panier-panier, A passe a B qui coupe au panier puis repasse a A dans la zone reservee pour le tir. Travail de la qualite des appuis dans les mouvements offensifs."
    tags:
      - appuis
      - demarquage-en-v
      - dribble
      - tir
      - demarquage
    sequences:
      - label: "Demarquage en V"
        instructions:
          - "2 colonnes, 1 ballon pour 2"
          - "A dribble jusqu'a la ligne des 3 points, arret en triple menace"
          - "B sprinte au poste haut, s'arrete, recoit le ballon"
          - "A effectue un demarquage en V ou un back-door"
          - "B passe a A qui tire en course"
          - "Rotation : les joueurs reviennent par l'exterieur, inversent les roles"
      - label: "Appuis dans le dribble"
        instructions:
          - "2 colonnes, 1 ballon pour 2"
          - "A dribble jusqu'a l'entree de la zone reservee, ressort derriere la ligne de 3 pts face au cercle"
          - "B sprinte sous le cercle, s'arrete dans l'axe panier-panier"
          - "A s'arrete, passe a B"
          - "B coupe au panier, repasse a A"
          - "A recoit dans la zone reservee et tire"
          - "Appuis : alterner entre arrets alternatifs et simultanes"
