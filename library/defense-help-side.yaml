name: "Help-Side Defense Adjustment"
description: "5 players, 1 ball. P passes to A or B on wings. C and D adjust defensive positioning: ball-side (denial) and help-side (triangle). When ball is received, on-ball defender orients to baseline, help defender positions in the key. 1v1 follows."
court_type: half_court
court_standard: fiba
duration: 10m
intensity: 3
category: defense
tags:
  - defense
  - help-side
  - off-ball
  - positioning
  - team-defense

sequences:
  - label: "Setup"
    ball_carrier: p1
    instructions:
      - "P at the top with ball"
      - "A and B on the wings (attackers)"
      - "C defends A, D defends B"
      - "C and D must adjust on every pass"
    players:
      - id: p1
        label: "P"
        role: attacker
        position: [0.50, 0.65]
      - id: a1
        label: "A"
        role: attacker
        position: [0.20, 0.40]
      - id: b1
        label: "B"
        role: attacker
        position: [0.80, 0.40]
      - id: c1
        label: "C"
        role: defender
        position: [0.25, 0.43]
      - id: d1
        label: "D"
        role: defender
        position: [0.65, 0.35]
    accessories: []
    actions: []

  - label: "Pass & Adjust"
    ball_carrier: b1
    instructions:
      - "P passes to B on the right wing"
      - "D closes out on B (ball-side defense)"
      - "C slides to help-side (triangle: ball-man-basket)"
      - "C has one foot in the key, sees both A and ball"
      - "B plays 1v1 against D, C provides help defense"
    players:
      - id: p1
        label: "P"
        role: attacker
        position: [0.50, 0.65]
      - id: a1
        label: "A"
        role: attacker
        position: [0.20, 0.40]
      - id: b1
        label: "B"
        role: attacker
        position: [0.80, 0.40]
      - id: c1
        label: "C"
        role: defender
        position: [0.40, 0.30]
      - id: d1
        label: "D"
        role: defender
        position: [0.75, 0.38]
    accessories: []
    actions:
      - type: pass
        from: p1
        to: b1
      - type: dribble
        from: b1
        to: [0.65, 0.25]

i18n:
  fr:
    name: "Placement defensif cote aide"
    description: "5 joueurs, 1 ballon. P passe a A ou B sur les ailes. C et D ajustent leur placement defensif : cote ballon (contestation) et cote aide (triangle). Quand le ballon est recu, le defenseur sur porteur oriente vers la ligne de fond, le defenseur en aide se place dans la raquette. 1c1 s'ensuit."
    tags:
      - defense
      - cote-aide
      - hors-ballon
      - positionnement
      - defense-equipe
    sequences:
      - label: "Mise en place"
        instructions:
          - "P en haut avec le ballon"
          - "A et B sur les ailes (attaquants)"
          - "C defend sur A, D defend sur B"
          - "C et D doivent s'ajuster a chaque passe"
      - label: "Passe et ajustement"
        instructions:
          - "P passe a B sur l'aile droite"
          - "D ferme sur B (defense cote ballon)"
          - "C glisse en aide (triangle : ballon-joueur-panier)"
          - "C a un pied dans la raquette, voit A et le ballon"
          - "B joue le 1c1 contre D, C fournit l'aide defensive"
