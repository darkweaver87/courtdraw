name: "Defensive Transition Reactivity"
description: "2 teams of 5, full court. Teams play 5v5 normally. On coach's whistle, attackers drop the ball and sprint back to defense. Other team grabs the ball and attacks the opposite basket. Develops reaction speed in defensive transition."
court_type: full_court
court_standard: fiba
duration: 10m
intensity: 5
category: defense
tags:
  - defense
  - transition
  - reactivity
  - conditioning
  - team-defense

sequences:
  - label: "Setup"
    instructions:
      - "2 teams of 5 in normal 5v5 positions"
      - "Play normally until coach's signal"
      - "Coach has whistle or calls 'change!'"
    players:
      - id: a1
        label: "1"
        role: attacker
        position: [0.50, 0.25]
      - id: a2
        label: "2"
        role: attacker
        position: [0.20, 0.30]
      - id: a3
        label: "3"
        role: attacker
        position: [0.80, 0.30]
      - id: d1
        label: "D1"
        role: defender
        position: [0.45, 0.20]
      - id: d2
        label: "D2"
        role: defender
        position: [0.25, 0.25]
      - id: d3
        label: "D3"
        role: defender
        position: [0.75, 0.25]
    accessories: []
    actions: []

  - label: "Whistle — Transition"
    instructions:
      - "Coach blows whistle: 'Change!'"
      - "Attacking team drops the ball and sprints back on defense"
      - "Defending team grabs ball and attacks opposite basket"
      - "Speed of transition is the key"
      - "Last team to get back runs a suicide"
      - "Ball can be passed to coach's assistant for faster transition"
    players:
      - id: d1
        label: "D1"
        role: attacker
        position: [0.50, 0.55]
      - id: d2
        label: "D2"
        role: attacker
        position: [0.30, 0.55]
      - id: d3
        label: "D3"
        role: attacker
        position: [0.70, 0.55]
      - id: a1
        label: "1"
        role: defender
        position: [0.50, 0.70]
      - id: a2
        label: "2"
        role: defender
        position: [0.30, 0.70]
      - id: a3
        label: "3"
        role: defender
        position: [0.70, 0.70]
    accessories: []
    actions: []

  - label: "3v2 Transition Variant"
    ball_carrier: a1
    instructions:
      - "4 attackers in a square, 3 defenders"
      - "Attackers pass 3 times then can shoot"
      - "After shot, shooter + last passer transition to defense"
      - "3 defenders rebound and attack other basket"
      - "Creates natural 3v2 defensive transition"
      - "If attackers rebound, defenders stay on defense"
    players:
      - id: a1
        label: "A1"
        role: attacker
        position: [0.30, 0.40]
      - id: a2
        label: "A2"
        role: attacker
        position: [0.70, 0.40]
      - id: a3
        label: "A3"
        role: attacker
        position: [0.30, 0.20]
      - id: a4
        label: "A4"
        role: attacker
        position: [0.70, 0.20]
      - id: d1
        label: "D1"
        role: defender
        position: [0.50, 0.35]
      - id: d2
        label: "D2"
        role: defender
        position: [0.40, 0.25]
      - id: d3
        label: "D3"
        role: defender
        position: [0.60, 0.25]
    accessories: []
    actions: []

i18n:
  fr:
    name: "Transition defensive reactivite"
    description: "2 equipes de 5, terrain entier. Les equipes jouent en 5c5 normal. Au coup de sifflet du coach, les attaquants posent le ballon et sprintent en defense. L'autre equipe recupere le ballon et attaque le panier oppose. Travail de la vitesse de reaction en transition defensive."
    tags:
      - defense
      - transition
      - reactivite
      - condition-physique
      - defense-collective
    sequences:
      - label: "Mise en place"
        instructions:
          - "2 equipes de 5 en positions 5c5 normales"
          - "Jouer normalement jusqu'au signal du coach"
          - "Le coach a un sifflet ou crie 'change !'"
      - label: "Sifflet — Transition"
        instructions:
          - "Le coach siffle : 'Change !'"
          - "L'equipe en attaque pose le ballon et sprinte en defense"
          - "L'equipe en defense recupere le ballon et attaque le panier oppose"
          - "La vitesse de transition est la cle"
          - "La derniere equipe a revenir court un suicide"
          - "Le ballon peut etre passe a l'assistant pour une transition plus rapide"
      - label: "Variante 3c2 transition"
        instructions:
          - "4 attaquants en carre, 3 defenseurs"
          - "Les attaquants passent 3 fois puis peuvent tirer"
          - "Apres le tir, le tireur + dernier passeur transitent en defense"
          - "Les 3 defenseurs prennent le rebond et attaquent l'autre panier"
          - "Cree une transition defensive naturelle en 3c2"
          - "Si les attaquants prennent le rebond, les defenseurs restent"
