name: "Pick & Roll from Wing"
description: "2 attackers + 1 passer. Ball handler on the wing uses a screen from the post player. Pick & roll with options: drive, mid-range pull-up, or pass to rolling screener. Develops pick & roll reads and execution."
court_type: half_court
court_standard: fiba
duration: 10m
intensity: 3
category: offense
tags:
  - pick-and-roll
  - screen
  - ball-screen
  - reads
  - two-man-game

sequences:
  - label: "Setup"
    ball_carrier: a1
    instructions:
      - "Guard (1) on the wing with the ball"
      - "Post player (5) at the elbow"
      - "Passer (P) at the top of the key"
    players:
      - id: a1
        label: "1"
        role: attacker
        position: [0.25, 0.45]
      - id: a2
        label: "5"
        role: attacker
        position: [0.40, 0.35]
      - id: p1
        label: "P"
        role: attacker
        position: [0.50, 0.55]
    accessories: []
    actions: []

  - label: "Screen & Roll"
    ball_carrier: a1
    instructions:
      - "5 sets a ball screen for 1"
      - "1 uses the screen and attacks middle"
      - "5 rolls hard to the basket after screening"
      - "Read the defense: if hedge → pass to roller"
      - "If drop → pull-up jumper"
      - "If switch → attack the mismatch"
    players:
      - id: a1
        label: "1"
        role: attacker
        position: [0.35, 0.35]
      - id: a2
        label: "5"
        role: attacker
        position: [0.35, 0.38]
      - id: d1
        label: "D1"
        role: defender
        position: [0.30, 0.40]
      - id: d2
        label: "D2"
        role: defender
        position: [0.38, 0.30]
    accessories: []
    actions:
      - type: screen
        from: a2
        to: [0.35, 0.38]
      - type: dribble
        from: a1
        to: [0.45, 0.25]

  - label: "Finish"
    ball_carrier: a1
    instructions:
      - "Option 1: 1 drives all the way for a layup"
      - "Option 2: 1 pulls up for mid-range"
      - "Option 3: 1 passes to 5 rolling to basket"
      - "5 reps each option, then switch roles"
      - "Add defenders progressively"
    players:
      - id: a1
        label: "1"
        role: attacker
        position: [0.45, 0.20]
      - id: a2
        label: "5"
        role: attacker
        position: [0.50, 0.15]
    accessories: []
    actions:
      - type: pass
        from: a1
        to: a2
      - type: shot_layup
        from: a2
        to: [0.50, 0.05]

i18n:
  fr:
    name: "Pick & roll depuis l'aile"
    description: "2 attaquants + 1 passeur. Le porteur de balle sur l'aile utilise un ecran du poste. Pick & roll avec options : penetration, tir mi-distance, ou passe au rolleur. Travail de la lecture et de l'execution du pick & roll."
    tags:
      - pick-and-roll
      - ecran
      - ecran-porteur
      - lecture
      - jeu-a-deux
    sequences:
      - label: "Mise en place"
        instructions:
          - "Meneur (1) sur l'aile avec le ballon"
          - "Poste (5) au coude"
          - "Passeur (P) en tete de raquette"
      - label: "Ecran et rouleau"
        instructions:
          - "5 pose un ecran sur le porteur pour 1"
          - "1 utilise l'ecran et attaque le milieu"
          - "5 roule fort vers le panier apres l'ecran"
          - "Lire la defense : si hedging → passe au rolleur"
          - "Si drop → tir mi-distance"
          - "Si switch → attaquer le mismatch"
      - label: "Finition"
        instructions:
          - "Option 1 : 1 penetre jusqu'au panier"
          - "Option 2 : 1 tire en mi-distance"
          - "Option 3 : 1 passe a 5 qui roule au panier"
          - "5 repetitions par option, puis changer les roles"
          - "Ajouter des defenseurs progressivement"
