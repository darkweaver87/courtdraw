name: "Point Guard Court Vision Passing"
description: "Point guard plays 1v1 at the top while coach signals which teammate to pass to. PG must read the defense and find the open player. 2 receivers on the wings. Develops peripheral vision and decision-making under pressure."
court_type: half_court
court_standard: fiba
duration: 10m
intensity: 3
category: offense
tags:
  - point-guard
  - passing
  - court-vision
  - decision-making
  - 1v1

sequences:
  - label: "Setup"
    ball_carrier: a1
    instructions:
      - "1 point guard (PG) with ball at the top"
      - "1 defender (D) on PG"
      - "2 receivers (R1, R2) on the wings"
      - "Coach behind PG signals to receivers"
    players:
      - id: a1
        label: "PG"
        role: attacker
        position: [0.50, 0.65]
      - id: d1
        label: "D"
        role: defender
        position: [0.50, 0.60]
      - id: r1
        label: "R1"
        role: attacker
        position: [0.20, 0.40]
      - id: r2
        label: "R2"
        role: attacker
        position: [0.80, 0.40]
    accessories: []
    actions: []

  - label: "Read & Pass"
    ball_carrier: a1
    instructions:
      - "PG attacks D in 1v1 at the top"
      - "Coach signals which receiver moves (cuts or pops)"
      - "PG must find and pass to the open receiver"
      - "If no pass available, PG can score"
      - "Variant: add second defender to help"
    players:
      - id: a1
        label: "PG"
        role: attacker
        position: [0.50, 0.50]
      - id: d1
        label: "D"
        role: defender
        position: [0.50, 0.48]
      - id: r1
        label: "R1"
        role: attacker
        position: [0.20, 0.35]
      - id: r2
        label: "R2"
        role: attacker
        position: [0.80, 0.35]
    accessories: []
    actions:
      - type: dribble
        from: a1
        to: [0.50, 0.50]
      - type: pass
        from: a1
        to: r1

i18n:
  fr:
    name: "Vision du jeu et passe du meneur"
    description: "Le meneur joue le 1c1 en haut pendant que le coach signale a quel coequipier passer. Le meneur doit lire la defense et trouver le joueur ouvert. 2 receveurs sur les ailes. Travail de la vision peripherique et de la prise de decision sous pression."
    tags:
      - meneur
      - passe
      - vision-du-jeu
      - prise-de-decision
      - 1c1
    sequences:
      - label: "Mise en place"
        instructions:
          - "1 meneur (PG) avec ballon en haut"
          - "1 defenseur (D) sur le meneur"
          - "2 receveurs (R1, R2) sur les ailes"
          - "Le coach derriere le meneur signale aux receveurs"
      - label: "Lire et passer"
        instructions:
          - "Le meneur attaque D en 1c1 en haut"
          - "Le coach signale quel receveur bouge (coupe ou s'ecarte)"
          - "Le meneur doit trouver et passer au receveur ouvert"
          - "Si pas de passe disponible, le meneur peut marquer"
          - "Variante : ajouter un deuxieme defenseur en aide"
