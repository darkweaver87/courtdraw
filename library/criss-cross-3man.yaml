name: "3-Man Criss-Cross"
description: "Full court 3-man weave. B passes to C and runs behind C. C passes to A and runs behind A. Continue until layup at the other end. Ball never touches the floor."
court_type: full_court
court_standard: fiba
duration: 10m
intensity: 2
category: offense
tags:
  - passing
  - movement
  - transition
  - 3-players
  - conditioning
  - layup

sequences:
  - label: "Setup"
    ball_carrier: b1
    instructions:
      - "3 columns on the baseline"
      - "Middle column (B) has the ball"
      - "Queues behind each column"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.15, 0.92]
      - id: b1
        label: "B"
        role: attacker
        position: [0.50, 0.92]
      - id: c1
        label: "C"
        role: attacker
        position: [0.85, 0.92]
      - id: qa
        label: "A"
        role: attacker
        type: queue
        count: 3
        position: [0.15, 0.97]
      - id: qb
        label: "B"
        role: attacker
        type: queue
        count: 3
        position: [0.50, 0.97]
      - id: qc
        label: "C"
        role: attacker
        type: queue
        count: 3
        position: [0.85, 0.97]
    accessories: []
    actions: []

  - label: "First Pass"
    ball_carrier: c1
    instructions:
      - "B passes to C and runs behind C"
      - "C catches and continues forward"
      - "Ball must not touch the floor"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.15, 0.75]
      - id: b1
        label: "B"
        role: attacker
        position: [0.75, 0.70]
      - id: c1
        label: "C"
        role: attacker
        position: [0.65, 0.72]
    accessories: []
    actions:
      - type: pass
        from: b1
        to: c1
      - type: sprint
        from: a1
        to: [0.15, 0.75]

  - label: "Weave"
    ball_carrier: a1
    instructions:
      - "C passes to A and runs behind A"
      - "A passes to B and runs behind B"
      - "Continue the weave pattern up the court"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.30, 0.45]
      - id: b1
        label: "B"
        role: attacker
        position: [0.60, 0.40]
      - id: c1
        label: "C"
        role: attacker
        position: [0.15, 0.42]
    accessories: []
    actions:
      - type: pass
        from: c1
        to: a1
      - type: pass
        from: a1
        to: b1

  - label: "Finish"
    ball_carrier: b1
    instructions:
      - "Last player with ball finishes with a layup"
      - "Ball must never bounce after the last pass"
      - "Variant: work in waves or round-trip"
      - "Variant: vary pass types (chest, bounce, overhead)"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.25, 0.15]
      - id: b1
        label: "B"
        role: attacker
        position: [0.50, 0.10]
      - id: c1
        label: "C"
        role: attacker
        position: [0.75, 0.15]
    accessories: []
    actions:
      - type: shot_layup
        from: b1
        to: [0.50, 0.05]

i18n:
  fr:
    name: "Criss-cross a 3"
    description: "Passes en mouvement tout terrain a 3. B passe a C et passe derriere C. C passe a A et passe derriere A. Continuer jusqu'au tir en course a l'autre bout. Le ballon ne doit jamais toucher le sol."
    tags:
      - passe
      - mouvement
      - transition
      - 3-joueurs
      - physique
      - tir-en-course
    sequences:
      - label: "Mise en place"
        instructions:
          - "3 colonnes sur la ligne de fond"
          - "La colonne du milieu (B) a le ballon"
          - "Files d'attente derriere chaque colonne"
      - label: "Premiere passe"
        instructions:
          - "B passe a C et passe derriere C"
          - "C recoit et continue vers l'avant"
          - "Le ballon ne doit pas toucher le sol"
      - label: "Enchainement"
        instructions:
          - "C passe a A et passe derriere A"
          - "A passe a B et passe derriere B"
          - "Continuer le schema de criss-cross en montant le terrain"
      - label: "Finition"
        instructions:
          - "Le dernier joueur avec le ballon finit en tir en course"
          - "Le ballon ne doit jamais rebondir apres la derniere passe"
          - "Variante : travail par vagues ou en aller-retour"
          - "Variante : varier les types de passes (directes, a terre, au-dessus de la tete)"
