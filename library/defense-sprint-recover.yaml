name: "Defensive Sprint & Recover"
description: "2 columns, 1 cone. B starts at center, contours cone then receives pass from A behind baseline. B dribbles to score at opposite basket. A sprints to recover and defend. If defender fails to recover, 5 push-ups. If attacker misses uncontested, 5 push-ups."
court_type: full_court
court_standard: fiba
duration: 10m
intensity: 4
category: defense
tags:
  - defense
  - sprint
  - recovery
  - transition
  - conditioning

sequences:
  - label: "Setup"
    ball_carrier: a1
    instructions:
      - "2 columns of players with balls"
      - "A behind baseline with ball"
      - "B at center circle"
      - "1 cone between them"
    players:
      - id: a1
        label: "A"
        role: defender
        position: [0.70, 0.95]
      - id: b1
        label: "B"
        role: attacker
        position: [0.40, 0.50]
      - id: qa
        label: "A"
        role: defender
        type: queue
        count: 3
        position: [0.75, 0.98]
      - id: qb
        label: "B"
        role: attacker
        type: queue
        count: 3
        position: [0.35, 0.55]
    accessories:
      - type: cone
        id: cn1
        position: [0.55, 0.70]
    actions: []

  - label: "Sprint & Recover"
    ball_carrier: b1
    instructions:
      - "B contours cone and receives pass from A"
      - "B dribbles at speed toward opposite basket"
      - "A sprints to recover ahead of B"
      - "A must get between B and the basket"
      - "Penalty: 5 push-ups for failure"
    players:
      - id: a1
        label: "A"
        role: defender
        position: [0.50, 0.25]
      - id: b1
        label: "B"
        role: attacker
        position: [0.55, 0.30]
    accessories: []
    actions:
      - type: sprint
        from: a1
        to: [0.50, 0.25]
      - type: dribble
        from: b1
        to: [0.55, 0.15]
      - type: shot_layup
        from: b1
        to: [0.50, 0.05]

  - label: "Variant"
    instructions:
      - "Adjust cone position to control defender's delay"
      - "Closer cone = defender recovers faster"
      - "Farther cone = attacker has more advantage"
      - "Rotation: A and B swap after each rep"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.70, 0.95]
      - id: b1
        label: "B"
        role: defender
        position: [0.40, 0.50]
    accessories:
      - type: cone
        id: cn1
        position: [0.55, 0.70]
    actions: []

i18n:
  fr:
    name: "Sprint defensif et replacement"
    description: "2 colonnes, 1 plot. B part du centre, contourne le plot et recoit la passe de A derriere la ligne de fond. B dribble pour marquer au panier oppose. A sprinte pour se replacer et defendre. Penalite de 5 pompes en cas d'echec."
    tags:
      - defense
      - sprint
      - replacement
      - transition
      - physique
    sequences:
      - label: "Mise en place"
        instructions:
          - "2 colonnes de joueurs avec ballons"
          - "A derriere la ligne de fond avec ballon"
          - "B au rond central"
          - "1 plot entre les deux"
      - label: "Sprint et replacement"
        instructions:
          - "B contourne le plot et recoit la passe de A"
          - "B dribble a pleine vitesse vers le panier oppose"
          - "A sprinte pour se replacer devant B"
          - "A doit se placer entre B et le panier"
          - "Penalite : 5 pompes en cas d'echec"
      - label: "Variante"
        instructions:
          - "Ajuster la position du plot pour controler le retard du defenseur"
          - "Plot plus proche = defenseur se replace plus vite"
          - "Plot plus loin = attaquant a plus d'avantage"
          - "Rotation : A et B echangent apres chaque repetition"
