name: "Help & Recover Defense"
description: "2 attackers, 2 defenders, quarter court. A plays 1v1 while D floats on the help side. If A beats his defender, D helps then recovers to his man (help & recover) or switches (help & change). Develops help-side defense concepts and rotation."
court_type: half_court
court_standard: fiba
duration: 10m
intensity: 4
category: defense
tags:
  - defense
  - help-defense
  - help-recover
  - rotation
  - team-defense

sequences:
  - label: "Setup"
    ball_carrier: a1
    instructions:
      - "A with ball on the wing"
      - "B on the opposite block"
      - "DA defends A (on-ball)"
      - "D floats on the basket-to-basket axis (help position)"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.20, 0.50]
      - id: b1
        label: "B"
        role: attacker
        position: [0.70, 0.20]
      - id: d1
        label: "DA"
        role: defender
        position: [0.25, 0.45]
      - id: d2
        label: "D"
        role: defender
        position: [0.50, 0.25]
    accessories: []
    actions: []

  - label: "Help & Recover"
    ball_carrier: a1
    instructions:
      - "A drives past DA toward the basket"
      - "D jumps to help — stops A's penetration"
      - "A passes to B (kick out)"
      - "D recovers quickly to B (help & recover)"
      - "DA recovers to defensive position"
      - "4 possessions per team, then switch roles"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.30, 0.30]
      - id: b1
        label: "B"
        role: attacker
        position: [0.70, 0.20]
      - id: d1
        label: "DA"
        role: defender
        position: [0.35, 0.30]
      - id: d2
        label: "D"
        role: defender
        position: [0.45, 0.20]
    accessories: []
    actions:
      - type: dribble
        from: a1
        to: [0.30, 0.30]
      - type: pass
        from: a1
        to: b1

  - label: "Help & Switch"
    ball_carrier: a1
    instructions:
      - "Same setup, but now D switches onto A"
      - "DA takes D's man (B)"
      - "Coach calls 'recover' or 'switch' before the play"
      - "Defenders must communicate loudly"
      - "Variant: coach decides ball handler direction (paint or baseline)"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.30, 0.25]
      - id: b1
        label: "B"
        role: attacker
        position: [0.70, 0.20]
      - id: d1
        label: "DA"
        role: defender
        position: [0.55, 0.20]
      - id: d2
        label: "D"
        role: defender
        position: [0.35, 0.22]
    accessories: []
    actions:
      - type: dribble
        from: a1
        to: [0.30, 0.25]

i18n:
  fr:
    name: "Defense aide et recuperation"
    description: "2 attaquants, 2 defenseurs, quart de terrain. A joue le 1c1 pendant que D flotte en aide. Si A deborde son defenseur, D aide puis recupere son joueur (aider-reprendre) ou change (aider-changer). Travail des concepts d'aide defensive et de rotation."
    tags:
      - defense
      - aide-defensive
      - aider-reprendre
      - rotation
      - defense-collective
    sequences:
      - label: "Mise en place"
        instructions:
          - "A avec ballon sur l'aile"
          - "B au bloc oppose"
          - "DA defend A (sur le ballon)"
          - "D flotte sur l'axe panier-panier (position d'aide)"
      - label: "Aider et reprendre"
        instructions:
          - "A penetre en dribble devant DA vers le panier"
          - "D saute en aide — stoppe la penetration de A"
          - "A passe a B (sortie de balle)"
          - "D recupere rapidement sur B (aider-reprendre)"
          - "DA recupere sa position defensive"
          - "4 possessions par equipe, puis changer les roles"
      - label: "Aider et changer"
        instructions:
          - "Meme mise en place, mais D change sur A"
          - "DA prend le joueur de D (B)"
          - "Le coach annonce 'reprendre' ou 'changer' avant l'action"
          - "Les defenseurs doivent communiquer fort"
          - "Variante : le coach decide la direction du porteur (raquette ou ligne de fond)"
