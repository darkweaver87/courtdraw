name: "Off-Screen Shooting"
description: "4 players minimum, 2 balls. A passes to B, cuts into the key, curls around the cone (simulating a screen). B passes to A who shoots. B goes to rebound. Develops shooting off screens with various reads (curl, flare, flash, backdoor)."
court_type: half_court
court_standard: fiba
duration: 10m
intensity: 2
category: offense
tags:
  - shooting
  - off-screen
  - catch-and-shoot
  - cones
  - technique

sequences:
  - label: "Setup"
    ball_carrier: a1
    instructions:
      - "1 cone at the mid-post area (simulating screener)"
      - "2 columns: A (shooters) on the baseline, B (passers) on the wing"
      - "2 or 3 balls minimum"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.15, 0.75]
      - id: b1
        label: "B"
        role: attacker
        position: [0.80, 0.55]
      - id: qa
        label: "A"
        role: attacker
        type: queue
        count: 3
        position: [0.10, 0.80]
      - id: qb
        label: "B"
        role: attacker
        type: queue
        count: 3
        position: [0.85, 0.60]
    accessories:
      - type: cone
        id: cn1
        position: [0.40, 0.35]
    actions: []

  - label: "Cut & Shoot"
    ball_carrier: a1
    instructions:
      - "A passes to B and cuts into the key"
      - "A curls around the cone toward the wing"
      - "B passes to A who catches and shoots"
      - "B goes to rebound"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.55, 0.40]
      - id: b1
        label: "B"
        role: attacker
        position: [0.80, 0.55]
    accessories:
      - type: cone
        id: cn1
        position: [0.40, 0.35]
    actions:
      - type: cut
        from: a1
        to: [0.55, 0.40]
      - type: pass
        from: b1
        to: a1
      - type: shot_jumpshot
        from: a1
        to: [0.50, 0.05]

  - label: "Rotation & Reads"
    instructions:
      - "A goes to rebound column, B's next player becomes passer"
      - "Vary the read: curl (tight around screen), flare (fade away from screen)"
      - "Flash (pop out to free throw line), backdoor (cut to basket)"
      - "Variant: add 1 or 2 defenders to make it live"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.15, 0.75]
      - id: b1
        label: "B"
        role: attacker
        position: [0.80, 0.55]
    accessories:
      - type: cone
        id: cn1
        position: [0.40, 0.35]
    actions: []

i18n:
  fr:
    name: "Tir apres ecran"
    description: "4 joueurs minimum, 2 ballons. A passe a B, coupe dans la raquette, contourne le plot (simulant un ecran). B passe a A qui tire. B va au rebond. Travail du tir apres ecran avec differentes lectures (curl, flare, flash, backdoor)."
    tags:
      - tir
      - ecran
      - reception-tir
      - plots
      - technique
    sequences:
      - label: "Mise en place"
        instructions:
          - "1 plot au poste moyen (simulant un ecraneur)"
          - "2 colonnes : A (tireurs) sur la ligne de fond, B (passeurs) sur l'aile"
          - "2 ou 3 ballons minimum"
      - label: "Coupe et tir"
        instructions:
          - "A passe a B et coupe dans la raquette"
          - "A contourne le plot vers l'aile"
          - "B passe a A qui recoit et tire"
          - "B va au rebond"
      - label: "Rotation et lectures"
        instructions:
          - "A va dans la colonne des rebondeurs, le suivant de B passe"
          - "Varier la lecture : curl (pres de l'ecran), flare (ecartement)"
          - "Flash (remontee vers la ligne des lancers-francs), backdoor (coupe vers le panier)"
          - "Variante : ajouter 1 ou 2 defenseurs pour du jeu reel"
