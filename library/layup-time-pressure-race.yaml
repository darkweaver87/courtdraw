name: "Layup Time Pressure Race"
description: "2 columns of players with balls. A and B advance toward the coach passing to each other. On the coach's signal, each races to their side to score a layup first. Develops finishing under time and psychological pressure."
court_type: full_court
court_standard: fiba
duration: 10m
intensity: 3
category: offense
tags:
  - layup
  - competition
  - pressure
  - transition
  - 2-players

sequences:
  - label: "Setup"
    ball_carrier: a1
    instructions:
      - "2 columns of players on the baseline, 1 with balls"
      - "Coach (E) at center court"
      - "A passes bounce pass, B passes chest pass while advancing"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.35, 0.92]
      - id: b1
        label: "B"
        role: attacker
        position: [0.65, 0.92]
      - id: e1
        label: "E"
        role: attacker
        position: [0.50, 0.50]
      - id: qa
        label: "A"
        role: attacker
        type: queue
        count: 3
        position: [0.30, 0.95]
      - id: qb
        label: "B"
        role: attacker
        type: queue
        count: 3
        position: [0.70, 0.95]
    accessories: []
    actions: []

  - label: "Advance & Pass"
    ball_carrier: b1
    instructions:
      - "A and B advance toward coach, passing to each other"
      - "A uses bounce passes, B uses chest passes"
      - "Continue until the coach gives the signal"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.40, 0.55]
      - id: b1
        label: "B"
        role: attacker
        position: [0.60, 0.55]
      - id: e1
        label: "E"
        role: attacker
        position: [0.50, 0.50]
    accessories: []
    actions:
      - type: pass
        from: a1
        to: b1
      - type: pass
        from: b1
        to: a1

  - label: "Race"
    ball_carrier: a1
    instructions:
      - "On the signal, each player races to score on their basket"
      - "The player who scores first wins"
      - "Variant: add a defender under each basket — must touch the free throw line before defending"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.30, 0.15]
      - id: b1
        label: "B"
        role: attacker
        position: [0.70, 0.85]
    accessories: []
    actions:
      - type: sprint
        from: a1
        to: [0.30, 0.15]
      - type: shot_layup
        from: a1
        to: [0.50, 0.05]

i18n:
  fr:
    name: "Course au tir en course"
    description: "2 colonnes de joueurs avec ballons. A et B avancent vers l'entraineur en se faisant des passes. Au signal, chacun court de son cote pour marquer en premier. Travail de la finition sous pression temporelle et psychologique."
    tags:
      - tir-en-course
      - competition
      - pression
      - transition
      - 2-joueurs
    sequences:
      - label: "Mise en place"
        instructions:
          - "2 colonnes de joueurs sur la ligne de fond, 1 avec ballons"
          - "Entraineur (E) au milieu du terrain"
          - "A passe a terre, B passe directe en avancant"
      - label: "Avancee et passes"
        instructions:
          - "A et B avancent vers l'entraineur en se faisant des passes"
          - "A fait des passes a terre, B des passes directes"
          - "Continuer jusqu'au signal de l'entraineur"
      - label: "Course"
        instructions:
          - "Au signal, chaque joueur court marquer sur son panier"
          - "Le joueur qui marque en premier gagne"
          - "Variante : ajouter un defenseur sous chaque panier qui doit toucher la ligne des lancers-francs avant de defendre"
