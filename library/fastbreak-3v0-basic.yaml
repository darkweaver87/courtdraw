name: "3v0 Fast Break Fundamentals"
description: "3 columns, 1 ball. A shoots, B rebounds and outlets to A who got open. C fills far lane. A dribbles center, passes to C for layup. B takes rebound and outlets to C for the return trip. Develops fast break lane filling and passing."
court_type: full_court
court_standard: fiba
duration: 10m
intensity: 3
category: offense
tags:
  - fast-break
  - transition
  - 3v0
  - passing
  - fundamentals

sequences:
  - label: "Setup"
    ball_carrier: a1
    instructions:
      - "3 columns of players"
      - "A with ball at left baseline"
      - "B (rebounder) under the basket"
      - "C at right baseline"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.15, 0.95]
      - id: b1
        label: "B"
        role: attacker
        position: [0.50, 0.90]
      - id: c1
        label: "C"
        role: attacker
        position: [0.85, 0.95]
    accessories: []
    actions: []

  - label: "Outlet & Fill Lanes"
    ball_carrier: a1
    instructions:
      - "A shoots, B rebounds"
      - "A gets open on the sideline for outlet pass"
      - "C fills the far sideline lane (wide)"
      - "B outlets to A, then fills the trailer lane"
      - "A dribbles up the center of the court"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.20, 0.50]
      - id: b1
        label: "B"
        role: attacker
        position: [0.50, 0.60]
      - id: c1
        label: "C"
        role: attacker
        position: [0.80, 0.50]
    accessories: []
    actions:
      - type: pass
        from: b1
        to: a1
      - type: dribble
        from: a1
        to: [0.50, 0.30]

  - label: "Finish"
    ball_carrier: c1
    instructions:
      - "A passes to C on the far side for a layup"
      - "B trails for rebound"
      - "On the return trip, B outlets to C and roles rotate"
      - "Variant: must make 5 passes minimum before shooting"
      - "Variant: finish with jump shot instead of layup"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.50, 0.20]
      - id: b1
        label: "B"
        role: attacker
        position: [0.50, 0.30]
      - id: c1
        label: "C"
        role: attacker
        position: [0.80, 0.10]
    accessories: []
    actions:
      - type: pass
        from: a1
        to: c1
      - type: shot_layup
        from: c1
        to: [0.50, 0.05]

i18n:
  fr:
    name: "Contre-attaque 3c0 fondamentaux"
    description: "3 colonnes, 1 ballon. A tire, B prend le rebond et sort la balle sur A qui s'est demarque. C remplit le couloir oppose. A dribble au centre, passe a C pour un tir en course. B prend le rebond et sort sur C pour le retour. Travail de l'occupation des couloirs et des passes en contre-attaque."
    tags:
      - contre-attaque
      - transition
      - 3c0
      - passe
      - fondamentaux
    sequences:
      - label: "Mise en place"
        instructions:
          - "3 colonnes de joueurs"
          - "A avec ballon a la ligne de fond gauche"
          - "B (rebondeur) sous le panier"
          - "C a la ligne de fond droite"
      - label: "Sortie de balle et couloirs"
        instructions:
          - "A tire, B prend le rebond"
          - "A se demarque sur la ligne de touche pour la sortie de balle"
          - "C remplit le couloir oppose (large)"
          - "B sort la balle sur A, puis remplit le couloir central"
          - "A dribble au centre du terrain"
      - label: "Finition"
        instructions:
          - "A passe a C du cote oppose pour un tir en course"
          - "B suit pour le rebond"
          - "Au retour, B sort la balle sur C et les roles tournent"
          - "Variante : minimum 5 passes avant de tirer"
          - "Variante : finir en tir en suspension au lieu du tir en course"
