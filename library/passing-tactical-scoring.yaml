name: "Tactical Pass Scoring"
description: "4v4 or 5v5 game where score depends on the type of pass before the shot. Outside-outside: 0 pts, outside-inside: 1 pt, inside-outside: 1 pt, inside-inside: 2 pts, skip pass: 2 pts. Develops tactical passing awareness."
court_type: half_court
court_standard: fiba
duration: 12m
intensity: 3
category: offense
tags:
  - passing
  - tactical
  - game-situation
  - scoring
  - 5v5

sequences:
  - label: "Setup"
    ball_carrier: a1
    instructions:
      - "4 or 5 attackers vs 4 or 5 defenders"
      - "Normal game rules apply"
      - "Score depends on the pass type before the shot"
    players:
      - id: a1
        label: "1"
        role: attacker
        position: [0.50, 0.85]
      - id: a2
        label: "2"
        role: attacker
        position: [0.20, 0.65]
      - id: a3
        label: "3"
        role: attacker
        position: [0.80, 0.65]
      - id: a4
        label: "4"
        role: attacker
        position: [0.35, 0.35]
      - id: a5
        label: "5"
        role: attacker
        position: [0.65, 0.35]
      - id: d1
        label: "X1"
        role: defender
        position: [0.50, 0.78]
      - id: d2
        label: "X2"
        role: defender
        position: [0.25, 0.60]
      - id: d3
        label: "X3"
        role: defender
        position: [0.75, 0.60]
      - id: d4
        label: "X4"
        role: defender
        position: [0.40, 0.32]
      - id: d5
        label: "X5"
        role: defender
        position: [0.60, 0.32]
    accessories: []
    actions: []

  - label: "Scoring Rules"
    ball_carrier: a4
    instructions:
      - "Outside → outside pass before shot: 0 point"
      - "Outside → inside pass before shot: 1 point"
      - "Inside → outside pass before shot: 1 point"
      - "Inside → inside pass before shot: 2 points"
      - "Skip pass (reversal) before shot: 2 points"
    players:
      - id: a1
        label: "1"
        role: attacker
        position: [0.50, 0.85]
      - id: a2
        label: "2"
        role: attacker
        position: [0.20, 0.55]
      - id: a4
        label: "4"
        role: attacker
        position: [0.40, 0.30]
      - id: d2
        label: "X2"
        role: defender
        position: [0.25, 0.50]
      - id: d4
        label: "X4"
        role: defender
        position: [0.45, 0.28]
    accessories: []
    actions:
      - type: pass
        from: a2
        to: a4
      - type: shot_jumpshot
        from: a4
        to: [0.50, 0.05]

  - label: "Variant"
    instructions:
      - "Variant: add defenders"
      - "Variant: only the last pass before the shot counts for scoring"
      - "2 series of 4 minutes"
    players:
      - id: a1
        label: "1"
        role: attacker
        position: [0.50, 0.85]
      - id: a2
        label: "2"
        role: attacker
        position: [0.20, 0.65]
      - id: a3
        label: "3"
        role: attacker
        position: [0.80, 0.65]
      - id: a4
        label: "4"
        role: attacker
        position: [0.35, 0.35]
      - id: a5
        label: "5"
        role: attacker
        position: [0.65, 0.35]
    accessories: []
    actions: []

i18n:
  fr:
    name: "Scoring par type de passe"
    description: "Jeu 4c4 ou 5c5 ou le score depend du type de passe avant le tir. Exterieur-exterieur : 0 pt, exterieur-interieur : 1 pt, interieur-exterieur : 1 pt, interieur-interieur : 2 pts, passe de renversement : 2 pts. Travail de la conscience tactique des passes."
    tags:
      - passe
      - tactique
      - situation-de-jeu
      - scoring
      - 5c5
    sequences:
      - label: "Mise en place"
        instructions:
          - "4 ou 5 attaquants contre 4 ou 5 defenseurs"
          - "Regles de jeu normales"
          - "Le score depend du type de passe avant le tir"
      - label: "Regles de score"
        instructions:
          - "Passe exterieur → exterieur avant le tir : 0 point"
          - "Passe exterieur → interieur avant le tir : 1 point"
          - "Passe interieur → exterieur avant le tir : 1 point"
          - "Passe interieur → interieur avant le tir : 2 points"
          - "Passe de renversement avant le tir : 2 points"
      - label: "Variante"
        instructions:
          - "Variante : ajouter des defenseurs"
          - "Variante : seule la passe avant le tir compte pour le score"
          - "2 series de 4 minutes"
