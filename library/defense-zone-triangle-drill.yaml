name: "Zone Defense Triangle Drill"
description: "Progressive zone defense drill. Starts with 3v2 triangle passing (attackers in triangle, 2 defenders), then 4v3 ball circulation with interior. Defenders synchronize movements with ball, always 1 on ball + others in help. Develops zone defense fundamentals."
court_type: half_court
court_standard: fiba
duration: 12m
intensity: 3
category: defense
tags:
  - defense
  - zone
  - rotation
  - synchronization
  - team-defense

sequences:
  - label: "3v2 Triangle"
    ball_carrier: a1
    instructions:
      - "A, B, C attackers in triangle formation"
      - "D and E defenders"
      - "Attackers pass the ball for 15-30 seconds"
      - "Always 1 defender on ball, 1 in help"
      - "Defenders try to intercept or force a 5-second violation"
      - "Defenders move during ball flight"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.50, 0.55]
      - id: b1
        label: "B"
        role: attacker
        position: [0.20, 0.25]
      - id: c1
        label: "C"
        role: attacker
        position: [0.80, 0.25]
      - id: d1
        label: "D"
        role: defender
        position: [0.40, 0.35]
      - id: d2
        label: "E"
        role: defender
        position: [0.60, 0.30]
    accessories: []
    actions:
      - type: pass
        from: a1
        to: b1
      - type: pass
        from: b1
        to: c1

  - label: "4v3 with Interior"
    ball_carrier: a1
    instructions:
      - "4 attackers around the perimeter + interior option"
      - "3 zone defenders"
      - "Ball handler pressured, others in help position"
      - "When pass goes to the wing, defenders rotate"
      - "When ball enters interior, closest defender contests"
      - "Pass 20-30 seconds without turnover (attackers goal)"
    players:
      - id: a1
        label: "1"
        role: attacker
        position: [0.50, 0.55]
      - id: a2
        label: "2"
        role: attacker
        position: [0.15, 0.35]
      - id: a3
        label: "3"
        role: attacker
        position: [0.85, 0.35]
      - id: a4
        label: "4"
        role: attacker
        position: [0.50, 0.20]
      - id: d1
        label: "D1"
        role: defender
        position: [0.45, 0.40]
      - id: d2
        label: "D2"
        role: defender
        position: [0.35, 0.25]
      - id: d3
        label: "D3"
        role: defender
        position: [0.65, 0.25]
    accessories: []
    actions:
      - type: pass
        from: a1
        to: a2

  - label: "4v3 Triangle + High Post"
    instructions:
      - "2 wings (sector 3, sector 0), 1 interior, 2 defenders"
      - "When pass is made, interior defender covers the wing"
      - "Wing defender covers the interior player"
      - "Continuous rotation on every pass"
      - "Progression: add 4th defender then play 5v5 zone"
    players:
      - id: a1
        label: "1"
        role: attacker
        position: [0.50, 0.55]
      - id: a2
        label: "2"
        role: attacker
        position: [0.15, 0.30]
      - id: a3
        label: "3"
        role: attacker
        position: [0.85, 0.15]
      - id: a4
        label: "4"
        role: attacker
        position: [0.50, 0.25]
      - id: d1
        label: "D1"
        role: defender
        position: [0.45, 0.35]
      - id: d2
        label: "D2"
        role: defender
        position: [0.60, 0.20]
    accessories: []
    actions: []

i18n:
  fr:
    name: "Defense de zone : exercice en triangle"
    description: "Exercice progressif de defense de zone. Commence en 3c2 avec passes en triangle (attaquants en triangle, 2 defenseurs), puis 4c3 avec circulation du ballon et interieur. Les defenseurs synchronisent leurs deplacements avec le ballon, toujours 1 sur le ballon + les autres en aide. Travail des fondamentaux de la defense de zone."
    tags:
      - defense
      - zone
      - rotation
      - synchronisation
      - defense-collective
    sequences:
      - label: "3c2 Triangle"
        instructions:
          - "A, B, C attaquants en formation triangle"
          - "D et E defenseurs"
          - "Les attaquants font circuler le ballon pendant 15-30 secondes"
          - "Toujours 1 defenseur sur le ballon, 1 en aide"
          - "Les defenseurs essaient d'intercepter ou de forcer une violation de 5 secondes"
          - "Les defenseurs bougent pendant le vol du ballon"
      - label: "4c3 avec interieur"
        instructions:
          - "4 attaquants autour du perimetre + option interieure"
          - "3 defenseurs en zone"
          - "Le porteur est presse, les autres en position d'aide"
          - "Quand la passe va sur l'aile, les defenseurs tournent"
          - "Quand le ballon entre a l'interieur, le defenseur le plus proche conteste"
          - "Passer 20-30 secondes sans perte de balle (objectif attaquants)"
      - label: "4c3 Triangle + poste haut"
        instructions:
          - "2 ailiers (secteur 3, secteur 0), 1 interieur, 2 defenseurs"
          - "A la passe, le defenseur de l'interieur couvre l'ailier"
          - "Le defenseur de l'ailier couvre l'interieur"
          - "Rotation continue a chaque passe"
          - "Progression : ajouter un 4eme defenseur puis jouer en 5c5 zone"
