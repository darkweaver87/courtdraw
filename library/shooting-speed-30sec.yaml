name: "30-Second Shooting Speed"
description: "3 players: 1 shooter, 1 rebounder, 1 passer. Shooter takes max shots in 30 seconds, touching the sideline between each shot. Goal: most baskets in 30 sec. Develops shooting speed under fatigue."
court_type: half_court
court_standard: fiba
duration: 10m
intensity: 3
category: offense
tags:
  - shooting
  - speed
  - conditioning
  - competition
  - 3-players

sequences:
  - label: "Setup"
    ball_carrier: c1
    instructions:
      - "2 balls for 3 players: 1 shooter (A), 1 rebounder (B), 1 passer (C)"
      - "A starts at the shooting spot"
      - "B under the basket for rebounds"
      - "C ready with balls at the wing"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.25, 0.45]
      - id: b1
        label: "B"
        role: attacker
        position: [0.45, 0.15]
      - id: c1
        label: "C"
        role: attacker
        position: [0.55, 0.30]
    accessories: []
    actions: []

  - label: "Shoot & Move"
    ball_carrier: a1
    instructions:
      - "A shoots, runs to touch the sideline, comes back"
      - "C feeds the ball to A (or B passes to C who feeds A)"
      - "A shoots again immediately"
      - "Goal: max baskets in 30 seconds"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.25, 0.45]
      - id: b1
        label: "B"
        role: attacker
        position: [0.45, 0.15]
      - id: c1
        label: "C"
        role: attacker
        position: [0.55, 0.30]
    accessories: []
    actions:
      - type: shot_jumpshot
        from: a1
        to: [0.50, 0.05]
      - type: sprint
        from: a1
        to: [0.05, 0.45]

  - label: "Rotation"
    instructions:
      - "3 reps per player then rotate: A→B→C→A"
      - "Variant: competition format with 4 balls, 2 passers, 2 rebounders"
      - "Each player must hit a basket at each spot to advance"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.45, 0.15]
      - id: b1
        label: "B"
        role: attacker
        position: [0.55, 0.30]
      - id: c1
        label: "C"
        role: attacker
        position: [0.25, 0.45]
    accessories: []
    actions: []

i18n:
  fr:
    name: "Vitesse de tir 30 secondes"
    description: "3 joueurs : 1 tireur, 1 rebondeur, 1 passeur. Le tireur fait le maximum de tirs en 30 secondes en touchant la ligne de touche entre chaque tir. Objectif : le plus de paniers en 30 sec. Travail de la vitesse de tir sous fatigue."
    tags:
      - tir
      - vitesse
      - physique
      - competition
      - 3-joueurs
    sequences:
      - label: "Mise en place"
        instructions:
          - "2 ballons pour 3 joueurs : 1 tireur (A), 1 rebondeur (B), 1 passeur (C)"
          - "A commence au spot de tir"
          - "B sous le panier pour les rebonds"
          - "C pret avec les ballons sur l'aile"
      - label: "Tir et deplacement"
        instructions:
          - "A tire, court toucher la ligne de touche, revient"
          - "C alimente A en ballons (ou B passe a C qui alimente A)"
          - "A tire immediatement"
          - "Objectif : maximum de paniers en 30 secondes"
      - label: "Rotation"
        instructions:
          - "3 repetitions par joueur puis rotation : A→B→C→A"
          - "Variante : format concours avec 4 ballons, 2 passeurs, 2 rebondeurs"
          - "Chaque joueur doit reussir un panier a chaque spot pour avancer"
