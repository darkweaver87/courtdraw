name: "Defense Against Give-and-Go"
description: "3 players: 1 attacker, 1 defender, 1 passer. A passes to C and cuts to basket. B must jump to the ball on the pass, push C backdoor, and recover on help line. After 3 ball reversals, 3v3 give-and-go game. Develops defensive reaction to pass & cut."
court_type: half_court
court_standard: fiba
duration: 10m
intensity: 3
category: defense
tags:
  - defense
  - give-and-go
  - jump-to-ball
  - help
  - positioning

sequences:
  - label: "Setup"
    ball_carrier: a1
    instructions:
      - "A (attacker) with ball at the wing"
      - "B (defender) on A"
      - "C (passer) at the top"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.75, 0.45]
      - id: b1
        label: "B"
        role: defender
        position: [0.70, 0.43]
      - id: c1
        label: "C"
        role: attacker
        position: [0.50, 0.65]
    accessories: []
    actions: []

  - label: "Pass & Cut Defense"
    ball_carrier: c1
    instructions:
      - "A passes to C and cuts toward basket (give-and-go)"
      - "B jumps to ball on the pass: 1 step toward ball"
      - "B pushes A backdoor if A cuts ball-side"
      - "B recovers to help-side position on basket-to-basket axis"
      - "C passes back to A who has relocated on wing"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.55, 0.20]
      - id: b1
        label: "B"
        role: defender
        position: [0.60, 0.30]
      - id: c1
        label: "C"
        role: attacker
        position: [0.50, 0.65]
    accessories: []
    actions:
      - type: pass
        from: a1
        to: c1
      - type: cut
        from: a1
        to: [0.55, 0.20]

  - label: "3v3 Game"
    ball_carrier: a1
    instructions:
      - "After 3 ball reversals, play 3v3"
      - "Offense: only give-and-go and pass-and-cut allowed"
      - "Defense: jump to ball, deny backdoor, help and recover"
      - "4 series of 3 reps per player"
      - "Rotation: A→B→C→A"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.75, 0.45]
      - id: b1
        label: "B"
        role: defender
        position: [0.70, 0.43]
      - id: c1
        label: "C"
        role: attacker
        position: [0.50, 0.65]
    accessories: []
    actions:
      - type: pass
        from: a1
        to: c1
      - type: cut
        from: a1
        to: [0.55, 0.20]

i18n:
  fr:
    name: "Defense sur passe et va"
    description: "3 joueurs : 1 attaquant, 1 defenseur, 1 passeur. A passe a C et coupe vers le panier. B doit sauter vers le ballon sur la passe, repousser C en backdoor et se replacer sur la ligne d'aide. Apres 3 renversements, 3c3 en passe et va. Travail de la reaction defensive sur passe et coupe."
    tags:
      - defense
      - passe-et-va
      - saut-vers-la-balle
      - aide
      - positionnement
    sequences:
      - label: "Mise en place"
        instructions:
          - "A (attaquant) avec ballon sur l'aile"
          - "B (defenseur) sur A"
          - "C (passeur) en haut"
      - label: "Defense sur passe et coupe"
        instructions:
          - "A passe a C et coupe vers le panier (passe et va)"
          - "B saute vers le ballon sur la passe : 1 pas vers le ballon"
          - "B repousse A en backdoor si A coupe cote ballon"
          - "B se replace en aide sur l'axe panier-panier"
          - "C repasse a A qui s'est replace sur l'aile"
      - label: "Jeu 3c3"
        instructions:
          - "Apres 3 renversements, jouer le 3c3"
          - "Attaque : uniquement passe et va et coupe apres passe"
          - "Defense : saut vers le ballon, nier le backdoor, aider et se replacer"
          - "4 series de 3 repetitions par joueur"
          - "Rotation : A→B→C→A"
