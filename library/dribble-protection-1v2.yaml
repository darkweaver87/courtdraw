name: "Dribble Protection 1v2"
description: "1 attacker with ball in the center circle against 2 defenders. Attacker tries to score while defenders orient and trap. Develops protect dribble under pressure."
court_type: half_court
court_standard: fiba
duration: 10m
intensity: 3
category: offense
tags:
  - dribble
  - protection
  - 1v2
  - pressure
  - ball-handling

sequences:
  - label: "Setup"
    ball_carrier: a1
    instructions:
      - "1 attacker with ball in the center circle area"
      - "2 defenders positioned around the circle"
      - "Attacker must get past both defenders and score"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.50, 0.80]
      - id: d1
        label: "D1"
        role: defender
        position: [0.40, 0.65]
      - id: d2
        label: "D2"
        role: defender
        position: [0.60, 0.65]
    accessories: []
    actions: []

  - label: "Pressure"
    ball_carrier: a1
    instructions:
      - "Attacker tries to go as fast as possible to the basket"
      - "2 defenders orient and try to trap"
      - "Attacker uses protect dribble, changes of direction"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.45, 0.55]
      - id: d1
        label: "D1"
        role: defender
        position: [0.38, 0.52]
      - id: d2
        label: "D2"
        role: defender
        position: [0.52, 0.50]
    accessories: []
    actions:
      - type: dribble
        from: a1
        to: [0.45, 0.55]
      - type: close_out
        from: d1
        to: a1
      - type: close_out
        from: d2
        to: a1

  - label: "Score or Rotate"
    ball_carrier: a1
    instructions:
      - "If attacker scores, restart from circle"
      - "If defenders recover ball, attacker goes out"
      - "Rotation: 2 defenders replaced by 2 waiting players"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.50, 0.12]
      - id: d1
        label: "D1"
        role: defender
        position: [0.42, 0.15]
      - id: d2
        label: "D2"
        role: defender
        position: [0.55, 0.18]
    accessories: []
    actions:
      - type: shot_layup
        from: a1
        to: [0.50, 0.05]

i18n:
  fr:
    name: "Dribble de protection 1c2"
    description: "1 attaquant avec ballon dans le demi-cercle central contre 2 defenseurs. L'attaquant tente de marquer tandis que les defenseurs orientent et trappent. Travail du dribble de protection sous pression."
    tags:
      - dribble
      - protection
      - 1c2
      - pression
      - conduite-de-balle
    sequences:
      - label: "Mise en place"
        instructions:
          - "1 attaquant avec ballon dans la zone du cercle central"
          - "2 defenseurs positionnes autour du cercle"
          - "L'attaquant doit passer les 2 defenseurs et marquer"
      - label: "Pression"
        instructions:
          - "L'attaquant tente d'aller le plus vite possible au panier"
          - "Les 2 defenseurs orientent et tentent de trapper"
          - "L'attaquant utilise le dribble de protection, changements de direction"
      - label: "Marquer ou rotation"
        instructions:
          - "Si l'attaquant marque, on reprend du cercle"
          - "Si les defenseurs recuperent le ballon, l'attaquant sort"
          - "Rotation : les 2 defenseurs sont remplaces par 2 joueurs en attente"
