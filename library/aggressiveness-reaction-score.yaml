name: "Reaction & Score Aggressiveness"
description: "2 players face to face near center circle, ball on the ground between them. On visual or auditory signal, both fight to grab the ball. Player who gets it attacks, other defends. Develops reaction speed and offensive aggressiveness."
court_type: half_court
court_standard: fiba
duration: 8m
intensity: 4
category: offense
tags:
  - aggressiveness
  - reaction
  - 1v1
  - competition
  - conditioning

sequences:
  - label: "Setup"
    instructions:
      - "2 players face to face near center circle"
      - "Ball on the ground between them"
      - "Both players in athletic stance"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.50, 0.60]
      - id: b1
        label: "B"
        role: defender
        position: [0.50, 0.55]
    accessories: []
    actions: []

  - label: "React & Attack"
    ball_carrier: a1
    instructions:
      - "On signal (coach clap, whistle, or visual cue), both dive for the ball"
      - "Player who grabs it becomes attacker"
      - "Other player becomes defender"
      - "Attacker drives to score immediately"
      - "Play to 5 points, then rotate pairs"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.50, 0.30]
      - id: b1
        label: "B"
        role: defender
        position: [0.50, 0.35]
    accessories: []
    actions:
      - type: dribble
        from: a1
        to: [0.50, 0.15]
      - type: shot_layup
        from: a1
        to: [0.50, 0.05]

i18n:
  fr:
    name: "Reaction et score - agressivite"
    description: "2 joueurs face a face pres du rond central, ballon au sol entre eux. Au signal visuel ou sonore, les deux se battent pour attraper le ballon. Celui qui l'obtient attaque, l'autre defend. Travail de la vitesse de reaction et de l'agressivite offensive."
    tags:
      - agressivite
      - reaction
      - 1c1
      - competition
      - physique
    sequences:
      - label: "Mise en place"
        instructions:
          - "2 joueurs face a face pres du rond central"
          - "Ballon au sol entre eux"
          - "Les deux joueurs en position athletique"
      - label: "Reagir et attaquer"
        instructions:
          - "Au signal (claquement, sifflet ou signal visuel), les deux plongent sur le ballon"
          - "Celui qui l'attrape devient attaquant"
          - "L'autre joueur devient defenseur"
          - "L'attaquant penetre pour marquer immediatement"
          - "Match en 5 points, puis rotation des paires"
