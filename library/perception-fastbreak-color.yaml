name: "Fast Break Perception Color Signal"
description: "3 attackers on baseline, 2 defenders on sideline at free throw level. Coach under basket with 2 colored jerseys. On signal, attackers sprint full court: player under basket does a forward roll on mat, grabs ball, calls out the jersey color shown by coach. Defenders start when center attacker grabs ball. Creates 3v2 where attackers must call the color before any action. Develops perception in fast break."
court_type: full_court
court_standard: fiba
duration: 10m
intensity: 5
category: offense
tags:
  - perception
  - fast-break
  - transition
  - awareness
  - conditioning

sequences:
  - label: "Setup"
    instructions:
      - "3 attackers (A, B, C) on baseline"
      - "A is under the basket facing the other basket"
      - "B and C are at the baseline on each side"
      - "2 defenders (D1, D2) on sideline at free throw level"
      - "Coach under basket with 2 colored jerseys"
      - "Mat placed on the free throw line, ball behind the mat"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.50, 0.90]
      - id: b1
        label: "B"
        role: attacker
        position: [0.20, 0.95]
      - id: c1
        label: "C"
        role: attacker
        position: [0.80, 0.95]
      - id: d1
        label: "D1"
        role: defender
        position: [0.10, 0.75]
      - id: d2
        label: "D2"
        role: defender
        position: [0.10, 0.70]
    accessories: []
    actions: []

  - label: "3v2 Fast Break"
    ball_carrier: a1
    instructions:
      - "On signal, all 3 attackers sprint toward opposite basket"
      - "A does a forward roll on the mat, grabs ball, calls jersey color"
      - "B and C sprint in the side lanes"
      - "2 defenders start when A grabs the ball"
      - "Players are now in 3v2 situation"
      - "Attackers MUST call out the color before any action (pass, dribble, shot)"
      - "Develops heads-up awareness in transition"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.50, 0.35]
      - id: b1
        label: "B"
        role: attacker
        position: [0.20, 0.30]
      - id: c1
        label: "C"
        role: attacker
        position: [0.80, 0.30]
      - id: d1
        label: "D1"
        role: defender
        position: [0.40, 0.20]
      - id: d2
        label: "D2"
        role: defender
        position: [0.60, 0.20]
    accessories: []
    actions:
      - type: pass
        from: a1
        to: b1

i18n:
  fr:
    name: "Perception en contre-attaque : signal couleur"
    description: "3 attaquants en ligne de fond, 2 defenseurs sur la ligne de touche au niveau des lancers-francs. L'entraineur sous le panier avec 2 chasubles de couleurs differentes. Au signal, les attaquants sprintent : le joueur sous le panier fait une roulade sur le tapis, recupere le ballon et annonce la couleur montree par le coach. Les defenseurs demarrent quand l'attaquant central saisit le ballon. Situation de 3c2 ou les attaquants doivent annoncer la couleur avant toute action. Travail de la perception en contre-attaque."
    tags:
      - perception
      - contre-attaque
      - transition
      - conscience-de-jeu
      - condition-physique
    sequences:
      - label: "Mise en place"
        instructions:
          - "3 attaquants (A, B, C) en ligne de fond"
          - "A est sous le panier face au panier adverse"
          - "B et C sont en ligne de fond de chaque cote"
          - "2 defenseurs (D1, D2) sur la ligne de touche au niveau des lancers-francs"
          - "Coach sous le panier avec 2 chasubles de couleurs"
          - "Tapis pose sur la ligne des lancers-francs, ballon derriere le tapis"
      - label: "Contre-attaque 3c2"
        instructions:
          - "Au signal, les 3 attaquants sprintent vers le panier oppose"
          - "A fait une roulade sur le tapis, recupere le ballon, annonce la couleur"
          - "B et C sprintent dans les couloirs lateraux"
          - "Les 2 defenseurs demarrent quand A saisit le ballon"
          - "Situation de 3c2"
          - "Les attaquants DOIVENT annoncer la couleur avant toute action (passe, dribble, tir)"
          - "Travail de la vision peripherique en transition"
