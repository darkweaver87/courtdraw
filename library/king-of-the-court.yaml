name: "King of the Court"
description: "Competitive 1v1 or 2v2 king-stays format"
court_type: half_court
court_standard: fiba
duration: 15m
intensity: 3
category: scrimmage
tags:
  - 1v1
  - 2v2
  - competition
  - scrimmage
  - U13
  - U15

sequences:
  - label: "Setup"
    instructions:
      - "King starts on defense at the basket"
      - "Challengers line up at the top of the key"
      - "First challenger attacks"
      - "Winner stays as King"
    players:
      - id: king
        label: "K"
        role: defender
        position: [0.50, 0.20]
      - id: c1
        label: "1"
        role: attacker
        position: [0.50, 0.75]
      - id: c2
        label: "2"
        role: attacker
        position: [0.50, 0.85]
      - id: c3
        label: "3"
        role: attacker
        position: [0.50, 0.92]
    accessories: []
    actions: []

  - label: "Attack"
    ball_carrier: c1
    instructions:
      - "Challenger 1 attacks the King"
      - "Play until score or stop"
      - "If challenger scores: they become King"
      - "If King stops: King stays"
    players:
      - id: king
        label: "K"
        role: defender
        position: [0.45, 0.30]
      - id: c1
        label: "1"
        role: attacker
        position: [0.40, 0.45]
      - id: c2
        label: "2"
        role: attacker
        position: [0.50, 0.85]
      - id: c3
        label: "3"
        role: attacker
        position: [0.50, 0.92]
    accessories: []
    actions:
      - type: dribble
        from: c1
        to: [0.40, 0.35]
      - type: close_out
        from: king
        to: c1

i18n:
  fr:
    name: "Roi du terrain"
    description: "1 contre 1 ou 2 contre 2 competitif, le gagnant reste"
    tags:
      - 1c1
      - 2c2
      - compétition
      - match
      - U13
      - U15
    sequences:
      - label: "Mise en place"
        instructions:
          - "Le Roi commence en defense pres du panier"
          - "Les challengers font la queue en haut de la raquette"
          - "Le premier challenger attaque"
          - "Le gagnant reste en tant que Roi"
      - label: "Attaque"
        instructions:
          - "Le challenger 1 attaque le Roi"
          - "Jeu jusqu'a un panier ou un arret"
          - "Si le challenger marque : il devient Roi"
          - "Si le Roi stoppe : le Roi reste"
