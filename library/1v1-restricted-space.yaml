name: "1v1 Restricted Space"
description: "2 players, 1 ball, 2 cones. Players around the free throw circle, attacker faces basket, defender behind. On signal, both go around their cone and play 1v1. Attacker plays between the two ends of the key. 3 sets of 6 reps."
court_type: half_court
court_standard: fiba
duration: 10m
intensity: 3
category: offense
tags:
  - 1v1
  - dribble
  - restricted-space
  - competition
  - technique

sequences:
  - label: "Setup"
    ball_carrier: a1
    instructions:
      - "2 players, 1 ball, 2 cones"
      - "A and B at the free throw circle, facing each other"
      - "A (attacker) faces the basket, B (defender) backs to basket"
      - "A and B pass back and forth"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.45, 0.45]
      - id: b1
        label: "B"
        role: defender
        position: [0.55, 0.45]
    accessories:
      - type: cone
        id: cn1
        position: [0.35, 0.40]
      - type: cone
        id: cn2
        position: [0.65, 0.40]
    actions: []

  - label: "Signal & 1v1"
    ball_carrier: a1
    instructions:
      - "On signal, A and B contour their respective cones"
      - "Then A plays 1v1 against B"
      - "A must play within the key width (between key edges)"
      - "3 sets of 6 reps, 30 sec rest between sets"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.45, 0.35]
      - id: b1
        label: "B"
        role: defender
        position: [0.50, 0.38]
    accessories:
      - type: cone
        id: cn1
        position: [0.35, 0.40]
      - type: cone
        id: cn2
        position: [0.65, 0.40]
    actions:
      - type: dribble
        from: a1
        to: [0.45, 0.20]
      - type: shot_layup
        from: a1
        to: [0.50, 0.05]

  - label: "Variant"
    instructions:
      - "Variant: A and B on opposite sides of 3-point line, back to back"
      - "B passes to A, contours cone to defend, A contours cone and attacks"
      - "Attacker exchanges with defender after each rep"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.45, 0.45]
      - id: b1
        label: "B"
        role: defender
        position: [0.55, 0.45]
    accessories:
      - type: cone
        id: cn1
        position: [0.35, 0.40]
      - type: cone
        id: cn2
        position: [0.65, 0.40]
    actions: []

i18n:
  fr:
    name: "1c1 espace restreint"
    description: "2 joueurs, 1 ballon, 2 plots. Joueurs autour du cercle des lancers-francs, l'attaquant face au panier, le defenseur derriere. Au signal, les deux contournent leur plot et jouent le 1c1. L'attaquant joue entre les deux extremites de la raquette. 3 series de 6 repetitions."
    tags:
      - 1c1
      - dribble
      - espace-restreint
      - competition
      - technique
    sequences:
      - label: "Mise en place"
        instructions:
          - "2 joueurs, 1 ballon, 2 plots"
          - "A et B au cercle des lancers-francs, face a face"
          - "A (attaquant) face au panier, B (defenseur) dos au panier"
          - "A et B se font des passes"
      - label: "Signal et 1c1"
        instructions:
          - "Au signal, A et B contournent leurs plots respectifs"
          - "Puis A joue le 1c1 contre B"
          - "A doit jouer dans la largeur de la raquette"
          - "3 series de 6 repetitions, 30 sec de repos entre les series"
      - label: "Variante"
        instructions:
          - "Variante : A et B de part et d'autre de la ligne des 3 points, dos a dos"
          - "B passe a A, contourne son plot pour defendre, A contourne son plot et attaque"
          - "L'attaquant echange avec le defenseur apres chaque repetition"
