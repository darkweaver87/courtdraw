name: "Indirect Stagger Screen"
description: "4 players + 1 passer. Shooter uses two staggered screens (vertical) to get open for a catch-and-shoot. Screeners set up at elbow and block. Passer reads the shooter's cut direction. Develops off-ball movement and screen usage."
court_type: half_court
court_standard: fiba
duration: 10m
intensity: 3
category: offense
tags:
  - screens
  - indirect-screen
  - stagger
  - catch-and-shoot
  - off-ball

sequences:
  - label: "Setup"
    ball_carrier: p1
    instructions:
      - "Passer (P) at top of key with ball"
      - "Shooter (S) on the low block"
      - "Screener 1 (S1) at the elbow"
      - "Screener 2 (S2) at the free throw line"
    players:
      - id: p1
        label: "P"
        role: attacker
        position: [0.50, 0.55]
      - id: s1
        label: "S"
        role: attacker
        position: [0.35, 0.15]
      - id: sc1
        label: "S1"
        role: attacker
        position: [0.40, 0.25]
      - id: sc2
        label: "S2"
        role: attacker
        position: [0.40, 0.35]
    accessories: []
    actions: []

  - label: "Stagger Screens"
    ball_carrier: p1
    instructions:
      - "S runs off S1's screen (first screen)"
      - "S continues off S2's screen (second screen)"
      - "S1 and S2 must have feet set before S arrives"
      - "S can curl, fade, or reject either screen"
      - "P reads S's cut and delivers the pass"
    players:
      - id: p1
        label: "P"
        role: attacker
        position: [0.50, 0.55]
      - id: s1
        label: "S"
        role: attacker
        position: [0.45, 0.35]
      - id: sc1
        label: "S1"
        role: attacker
        position: [0.40, 0.25]
      - id: sc2
        label: "S2"
        role: attacker
        position: [0.40, 0.35]
    accessories: []
    actions:
      - type: screen
        from: sc1
        to: [0.40, 0.25]
      - type: screen
        from: sc2
        to: [0.40, 0.35]
      - type: cut
        from: s1
        to: [0.55, 0.40]

  - label: "Catch & Shoot"
    ball_carrier: s1
    instructions:
      - "S catches on the move and shoots"
      - "Options: 3-point shot if fading, mid-range if curling"
      - "Screeners roll/pop after screening"
      - "5 reps, then rotate roles"
      - "Add defenders to practice reading screens"
    players:
      - id: p1
        label: "P"
        role: attacker
        position: [0.50, 0.55]
      - id: s1
        label: "S"
        role: attacker
        position: [0.55, 0.40]
      - id: sc1
        label: "S1"
        role: attacker
        position: [0.40, 0.20]
      - id: sc2
        label: "S2"
        role: attacker
        position: [0.45, 0.30]
    accessories: []
    actions:
      - type: pass
        from: p1
        to: s1
      - type: shot_jumpshot
        from: s1
        to: [0.50, 0.05]

i18n:
  fr:
    name: "Ecran indirect en decale"
    description: "4 joueurs + 1 passeur. Le tireur utilise deux ecrans decales (verticaux) pour se liberer et tirer apres reception. Les poseurs d'ecran se placent au coude et au bloc. Le passeur lit la direction de la coupe du tireur. Travail du jeu sans ballon et de l'utilisation des ecrans."
    tags:
      - ecrans
      - ecran-indirect
      - decale
      - tir-apres-reception
      - jeu-sans-ballon
    sequences:
      - label: "Mise en place"
        instructions:
          - "Passeur (P) en tete de raquette avec le ballon"
          - "Tireur (S) au bloc bas"
          - "Poseur 1 (S1) au coude"
          - "Poseur 2 (S2) a la ligne des lancers francs"
      - label: "Ecrans decales"
        instructions:
          - "S court derriere l'ecran de S1 (premier ecran)"
          - "S continue derriere l'ecran de S2 (deuxieme ecran)"
          - "S1 et S2 doivent avoir les pieds poses avant l'arrivee de S"
          - "S peut curler, fader ou refuser chaque ecran"
          - "P lit la coupe de S et delivre la passe"
      - label: "Reception et tir"
        instructions:
          - "S attrape en mouvement et tire"
          - "Options : tir a 3 points si fade, mi-distance si curl"
          - "Les poseurs roulent ou s'ecartent apres l'ecran"
          - "5 repetitions, puis rotation des roles"
          - "Ajouter des defenseurs pour travailler la lecture des ecrans"
