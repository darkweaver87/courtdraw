    tags:
      - 1c1
      - transition
      - dribble
      - vitesse
      - physique
    sequences:
      - label: "Mise en place"
        instructions:
          - "1 attaquant avec ballon, 1 defenseur, 3 plots"
          - "Les deux partent cote a cote derriere la ligne de fond"
          - "Plot P1 pres de la raquette, plot P2 au centre, plot P3 au bout"
      - label: "Sprint et poursuite"
        instructions:
          - "Au signal, A sprinte en dribblant au-dela du plot P2 vers le panier"
          - "B coupe au-dela du plot P1 puis poursuit A"
          - "A doit marquer avant que B le rattrape et defende"
      - label: "Rotation"
        instructions:
          - "L'attaquant devient defenseur et inversement"
          - "Variante : ajuster la position du plot P1 pour controler le retard du defenseur"
