name: "Post Shooting Alternating Sides"
description: "1 ball per player near the basket. Player executes 10 consecutive shots alternating left and right sides. Each series, change the finish: lay-up, lay-back, jump shot, hook shot, power lay-up. Develops post finishing variety."
court_type: half_court
court_standard: fiba
duration: 10m
intensity: 2
category: offense
tags:
  - post-play
  - shooting
  - finishing
  - technique
  - inside

sequences:
  - label: "Setup"
    ball_carrier: a1
    instructions:
      - "1 ball per player"
      - "Players line up near the basket"
      - "Series of 10 shots alternating left and right"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.35, 0.25]
      - id: b1
        label: "B"
        role: attacker
        position: [0.65, 0.25]
      - id: c1
        label: "C"
        role: attacker
        position: [0.50, 0.45]
    accessories: []
    actions: []

  - label: "Right Side"
    ball_carrier: a1
    instructions:
      - "1 power dribble if needed, then finish right side"
      - "Recover own rebound"
      - "Move to the left side"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.60, 0.20]
    accessories: []
    actions:
      - type: dribble
        from: a1
        to: [0.60, 0.20]
      - type: shot_layup
        from: a1
        to: [0.55, 0.05]

  - label: "Left Side & Variants"
    ball_carrier: a1
    instructions:
      - "Alternate: left side, right side, 10 total"
      - "Series 1: lay-up; Series 2: lay-back; Series 3: jump shot"
      - "Series 4: hook shot; Series 5: power lay-up"
      - "Variant: place 2 balls on the floor at the key edge — grab, pivot, shoot"
      - "Rotation: A→B→C→A"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.40, 0.20]
    accessories: []
    actions:
      - type: dribble
        from: a1
        to: [0.40, 0.20]
      - type: shot_layup
        from: a1
        to: [0.45, 0.05]

i18n:
  fr:
    name: "Tir interieur alternance droite-gauche"
    description: "1 ballon par joueur pres du panier. Le joueur execute 10 tirs consecutifs en alternant cote gauche et cote droit. A chaque serie, changer la finition : lay-up, lay-back, tir en suspension, tir crochet, power lay-up. Travail de la variete des finitions au poste."
    tags:
      - poste
      - tir
      - finition
      - technique
      - interieur
    sequences:
      - label: "Mise en place"
        instructions:
          - "1 ballon par joueur"
          - "Les joueurs se placent pres du panier"
          - "Serie de 10 tirs en alternant gauche et droite"
      - label: "Cote droit"
        instructions:
          - "1 dribble fort si necessaire, puis finition cote droit"
          - "Recuperer son propre rebond"
          - "Aller du cote gauche"
      - label: "Cote gauche et variantes"
        instructions:
          - "Alterner : cote gauche, cote droit, 10 au total"
          - "Serie 1 : lay-up ; Serie 2 : lay-back ; Serie 3 : tir en suspension"
          - "Serie 4 : tir crochet ; Serie 5 : power lay-up"
          - "Variante : poser 2 ballons au sol en bordure de raquette — saisir, pivoter, tirer"
          - "Rotation : A→B→C→A"
