name: "3-Cone Layup Finishes"
description: "1 ball per player, 3 cones around the key. Player dribbles around cones 1&2 for right-side layup, recovers ball, dribbles around cones 1&3 for left-side layup, then around cone 1 for face layup. Vary finish types each series."
court_type: half_court
court_standard: fiba
duration: 10m
intensity: 2
category: offense
tags:
  - layup
  - dribble
  - cones
  - technique
  - finishing

sequences:
  - label: "Setup"
    ball_carrier: a1
    instructions:
      - "1 ball per player, 3 cones around the key"
      - "Column behind baseline"
      - "Cone 1: top of key, Cone 2: right side, Cone 3: left side"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.50, 0.90]
      - id: qa
        label: "A"
        role: attacker
        type: queue
        count: 4
        position: [0.50, 0.95]
    accessories:
      - type: cone
        id: c1
        position: [0.50, 0.55]
      - type: cone
        id: c2
        position: [0.70, 0.40]
      - type: cone
        id: c3
        position: [0.30, 0.40]
    actions: []

  - label: "Right Side"
    ball_carrier: a1
    instructions:
      - "Dribble around cones 1 and 2"
      - "Finish with right-side layup"
      - "Recover ball"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.65, 0.30]
    accessories:
      - type: cone
        id: c1
        position: [0.50, 0.55]
      - type: cone
        id: c2
        position: [0.70, 0.40]
      - type: cone
        id: c3
        position: [0.30, 0.40]
    actions:
      - type: dribble
        from: a1
        to: [0.65, 0.30]
      - type: shot_layup
        from: a1
        to: [0.55, 0.05]

  - label: "Left Side & Face"
    ball_carrier: a1
    instructions:
      - "Dribble around cones 1 and 3 for left-side layup"
      - "Recover ball, dribble around cone 1 for face layup"
      - "Every 3 shots, vary the finish: lay-up, lay-back, power lay-up, hook shot"
      - "Vary footwork: big step + small step, small + big, offset steps"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.35, 0.30]
    accessories:
      - type: cone
        id: c1
        position: [0.50, 0.55]
      - type: cone
        id: c2
        position: [0.70, 0.40]
      - type: cone
        id: c3
        position: [0.30, 0.40]
    actions:
      - type: dribble
        from: a1
        to: [0.35, 0.30]
      - type: shot_layup
        from: a1
        to: [0.45, 0.05]

i18n:
  fr:
    name: "Tir en course 3 plots"
    description: "1 ballon par joueur, 3 plots autour de la raquette. Le joueur dribble autour des plots 1 et 2 pour un tir cote droit, recupere le ballon, contourne les plots 1 et 3 pour un tir cote gauche, puis le plot 1 pour un tir de face. Varier les lachers a chaque serie."
    tags:
      - tir-en-course
      - dribble
      - plots
      - technique
      - finition
    sequences:
      - label: "Mise en place"
        instructions:
          - "1 ballon par joueur, 3 plots autour de la raquette"
          - "Colonne derriere la ligne de fond"
          - "Plot 1 : tete de raquette, Plot 2 : cote droit, Plot 3 : cote gauche"
      - label: "Cote droit"
        instructions:
          - "Dribbler autour des plots 1 et 2"
          - "Finir en tir en course cote droit"
          - "Recuperer le ballon"
      - label: "Cote gauche et face"
        instructions:
          - "Dribbler autour des plots 1 et 3 pour un tir cote gauche"
          - "Recuperer le ballon, dribbler autour du plot 1 pour un tir de face"
          - "A chaque serie de 3 tirs, varier le lacher : lay-up, lay-back, power lay-up, tir crochet"
          - "Varier les appuis : grand pas + petit pas, petit + grand, appuis decales"
