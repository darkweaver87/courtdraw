name: "4v2 Fast Break Numbers Advantage"
description: "4 attackers vs 2 defenders, full court. Attackers must score within 8 seconds using quick ball movement. After the play, 2 attackers stay as defenders, 2 new attackers enter. Develops decision-making with numerical advantage."
court_type: full_court
court_standard: fiba
duration: 12m
intensity: 4
category: offense
tags:
  - fast-break
  - 4v2
  - transition
  - numbers
  - decision-making

sequences:
  - label: "Setup"
    ball_carrier: a1
    instructions:
      - "4 attackers (1, 2, 3, 4) at half court"
      - "2 defenders (D1, D2) near their basket"
      - "Attackers must fill all 3 lanes plus trailer"
    players:
      - id: a1
        label: "1"
        role: attacker
        position: [0.50, 0.55]
      - id: a2
        label: "2"
        role: attacker
        position: [0.20, 0.55]
      - id: a3
        label: "3"
        role: attacker
        position: [0.80, 0.55]
      - id: a4
        label: "4"
        role: attacker
        position: [0.50, 0.65]
      - id: d1
        label: "D1"
        role: defender
        position: [0.40, 0.20]
      - id: d2
        label: "D2"
        role: defender
        position: [0.60, 0.20]
    accessories: []
    actions: []

  - label: "4v2 Attack"
    ball_carrier: a1
    instructions:
      - "1 pushes the ball up the center"
      - "2 and 3 fill the wings wide"
      - "4 trails as safety valve"
      - "Maximum 2 dribbles per player"
      - "Must score within 8 seconds"
      - "Ball handler reads D1: pass to open wing"
    players:
      - id: a1
        label: "1"
        role: attacker
        position: [0.50, 0.25]
      - id: a2
        label: "2"
        role: attacker
        position: [0.15, 0.15]
      - id: a3
        label: "3"
        role: attacker
        position: [0.85, 0.15]
      - id: a4
        label: "4"
        role: attacker
        position: [0.50, 0.35]
      - id: d1
        label: "D1"
        role: defender
        position: [0.45, 0.15]
      - id: d2
        label: "D2"
        role: defender
        position: [0.55, 0.10]
    accessories: []
    actions:
      - type: dribble
        from: a1
        to: [0.50, 0.25]
      - type: pass
        from: a1
        to: a2
      - type: shot_layup
        from: a2
        to: [0.50, 0.05]

  - label: "Rotation"
    instructions:
      - "After the play, 2 attackers become defenders"
      - "2 new attackers enter from half court"
      - "Continuous rotation"
      - "Variant: 8-second shot clock for urgency"
    players:
      - id: d1
        label: "D1"
        role: defender
        position: [0.40, 0.20]
      - id: d2
        label: "D2"
        role: defender
        position: [0.60, 0.20]
      - id: a1
        label: "1"
        role: attacker
        position: [0.30, 0.55]
      - id: a2
        label: "2"
        role: attacker
        position: [0.50, 0.55]
      - id: a3
        label: "3"
        role: attacker
        position: [0.70, 0.55]
      - id: a4
        label: "4"
        role: attacker
        position: [0.50, 0.65]
    accessories: []
    actions: []

i18n:
  fr:
    name: "Contre-attaque 4c2 en surnombre"
