    tags:
      - contre-attaque
      - 4c2
      - transition
      - surnombre
      - prise-de-decision
    sequences:
      - label: "Mise en place"
        instructions:
          - "4 attaquants (1, 2, 3, 4) a mi-terrain"
          - "2 defenseurs (D1, D2) pres de leur panier"
          - "Les attaquants doivent remplir les 3 couloirs plus le retardataire"
      - label: "Attaque 4c2"
        instructions:
          - "1 pousse le ballon au centre"
          - "2 et 3 remplissent les ailes en largeur"
          - "4 suit comme soupape de securite"
          - "Maximum 2 dribbles par joueur"
          - "Marquer en 8 secondes maximum"
          - "Le porteur lit D1 : passe a l'ailier ouvert"
      - label: "Rotation"
        instructions:
          - "Apres l'action, 2 attaquants deviennent defenseurs"
          - "2 nouveaux attaquants entrent depuis mi-terrain"
          - "Rotation continue"
          - "Variante : chrono de 8 secondes pour l'urgence"
