name: "Gauntlet"
description: "Full-court layup drill with defensive pressure"
court_type: full_court
court_standard: fiba
duration: 12m
intensity: 2
category: warmup
tags:
  - warmup
  - layup
  - full-court
  - conditioning

sequences:
  - label: "Setup"
    ball_carrier: coach
    instructions:
      - "Two lines at half-court, one on each side"
      - "Coach at the center circle with a ball"
      - "Defenders at each end of the court"
    players:
      - id: a1
        label: "A1"
        role: attacker
        position: [0.3, 0.52]
      - id: a2
        label: "A2"
        role: attacker
        position: [0.7, 0.52]
      - id: d1
        label: "D1"
        role: defender
        position: [0.5, 0.15]
      - id: d2
        label: "D2"
        role: defender
        position: [0.5, 0.85]
      - id: coach
        label: "C"
        role: coach
        position: [0.5, 0.50]
    accessories: []
    actions: []

  - label: "Pass"
    ball_carrier: a1
    instructions:
      - "Coach passes to A1"
    players:
      - id: a1
        label: "A1"
        role: attacker
        position: [0.3, 0.52]
      - id: a2
        label: "A2"
        role: attacker
        position: [0.7, 0.52]
      - id: d1
        label: "D1"
        role: defender
        position: [0.5, 0.15]
      - id: d2
        label: "D2"
        role: defender
        position: [0.5, 0.85]
      - id: coach
        label: "C"
        role: coach
        position: [0.5, 0.50]
    accessories: []
    actions:
      - type: pass
        from: coach
        to: a1

  - label: "Drive"
    ball_carrier: a1
    instructions:
      - "A1 drives full court for a layup"
      - "D1 provides token pressure"
    players:
      - id: a1
        label: "A1"
        role: attacker
        position: [0.3, 0.10]
      - id: a2
        label: "A2"
        role: attacker
        position: [0.7, 0.52]
      - id: d1
        label: "D1"
        role: defender
        position: [0.35, 0.12]
      - id: d2
        label: "D2"
        role: defender
        position: [0.5, 0.85]
      - id: coach
        label: "C"
        role: coach
        position: [0.5, 0.50]
    accessories: []
    actions:
      - type: dribble
        from: a1
        to: [0.3, 0.10]

  - label: "Layup"
    ball_carrier: a1
    instructions:
      - "A1 must finish at the rim"
    players:
      - id: a1
        label: "A1"
        role: attacker
        position: [0.3, 0.10]
      - id: a2
        label: "A2"
        role: attacker
        position: [0.7, 0.52]
      - id: d1
        label: "D1"
        role: defender
        position: [0.35, 0.12]
      - id: d2
        label: "D2"
        role: defender
        position: [0.5, 0.85]
      - id: coach
        label: "C"
        role: coach
        position: [0.5, 0.50]
    accessories: []
    actions:
      - type: shot_layup
        from: a1
        to: [0.5, 0.05]

i18n:
  fr:
    name: "La Haie"
    description: "Exercice de layup en terrain complet avec pression defensive"
    tags:
      - échauffement
      - layup
      - terrain complet
      - physique
    sequences:
      - label: "Mise en place"
        instructions:
          - "Deux files au milieu du terrain, une de chaque cote"
          - "Coach au rond central avec un ballon"
          - "Defenseurs a chaque extremite du terrain"
      - label: "Passe"
        instructions:
          - "Le coach passe a A1"
      - label: "Penetration"
        instructions:
          - "A1 penetre sur tout le terrain pour un layup"
          - "D1 exerce une pression legere"
      - label: "Layup"
        instructions:
          - "A1 doit finir au cercle"
