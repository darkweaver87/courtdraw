name: "3v2 Fast Break with Color Signal"
description: "3 attackers vs 2 defenders, full court. Coach raises a colored card mid-transition to indicate which wing should receive the ball. Attackers must react to the visual signal while maintaining speed. Develops court vision and perception in transition."
court_type: full_court
court_standard: fiba
duration: 10m
intensity: 4
category: offense
tags:
  - fast-break
  - 3v2
  - perception
  - court-vision
  - transition

sequences:
  - label: "Setup"
    ball_carrier: a1
    instructions:
      - "3 attackers (1, 2, 3) at baseline"
      - "2 defenders (D1, D2) at half court"
      - "Coach at sideline with colored cards"
    players:
      - id: a1
        label: "1"
        role: attacker
        position: [0.50, 0.90]
      - id: a2
        label: "2"
        role: attacker
        position: [0.20, 0.90]
      - id: a3
        label: "3"
        role: attacker
        position: [0.80, 0.90]
      - id: d1
        label: "D1"
        role: defender
        position: [0.40, 0.50]
      - id: d2
        label: "D2"
        role: defender
        position: [0.60, 0.50]
    accessories: []
    actions: []

  - label: "Transition & Signal"
    ball_carrier: a1
    instructions:
      - "1 pushes ball up center, 2 and 3 fill wings"
      - "At half court, coach raises colored card"
      - "Red = pass left wing, Blue = pass right wing"
      - "Ball handler must see the signal and react"
      - "Head up, eyes scanning while dribbling"
    players:
      - id: a1
        label: "1"
        role: attacker
        position: [0.50, 0.40]
      - id: a2
        label: "2"
        role: attacker
        position: [0.15, 0.35]
      - id: a3
        label: "3"
        role: attacker
        position: [0.85, 0.35]
      - id: d1
        label: "D1"
        role: defender
        position: [0.45, 0.25]
      - id: d2
        label: "D2"
        role: defender
        position: [0.55, 0.20]
    accessories: []
    actions:
      - type: dribble
        from: a1
        to: [0.50, 0.40]
      - type: pass
        from: a1
        to: a2

  - label: "Finish"
    ball_carrier: a2
    instructions:
      - "Wing player receives and finishes (layup)"
      - "Other wing crashes for rebound"
      - "If defenders adjust, extra pass available"
      - "Rotation: attackers become defenders"
    players:
      - id: a1
        label: "1"
        role: attacker
        position: [0.50, 0.20]
      - id: a2
        label: "2"
        role: attacker
        position: [0.20, 0.10]
      - id: a3
        label: "3"
        role: attacker
        position: [0.75, 0.15]
      - id: d1
        label: "D1"
        role: defender
        position: [0.35, 0.12]
      - id: d2
        label: "D2"
        role: defender
        position: [0.55, 0.10]
    accessories: []
    actions:
      - type: shot_layup
        from: a2
        to: [0.50, 0.05]

i18n:
  fr:
    name: "Contre-attaque 3c2 avec signal couleur"
    description: "3 attaquants contre 2 defenseurs, terrain entier. Le coach leve une carte de couleur pendant la transition pour indiquer quel ailier doit recevoir le ballon. Les attaquants doivent reagir au signal visuel tout en maintenant la vitesse. Travail de la vision du jeu et de la perception en transition."
    tags:
      - contre-attaque
      - 3c2
      - perception
      - vision-du-jeu
      - transition
    sequences:
      - label: "Mise en place"
        instructions:
          - "3 attaquants (1, 2, 3) a la ligne de fond"
          - "2 defenseurs (D1, D2) a mi-terrain"
          - "Coach sur le cote avec des cartes de couleur"
      - label: "Transition et signal"
        instructions:
          - "1 pousse le ballon au centre, 2 et 3 remplissent les ailes"
          - "A mi-terrain, le coach leve une carte de couleur"
          - "Rouge = passe aile gauche, Bleu = passe aile droite"
          - "Le porteur doit voir le signal et reagir"
          - "Tete haute, yeux qui scannent en dribblant"
      - label: "Finition"
        instructions:
          - "L'ailier recoit et finit (tir en course)"
          - "L'autre ailier plonge au rebond"
          - "Si les defenseurs s'ajustent, passe supplementaire possible"
          - "Rotation : les attaquants deviennent defenseurs"
