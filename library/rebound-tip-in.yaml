name: "Tip-In Drill (3 Tips)"
description: "Players in pairs at the basket. Player throws ball off the backboard and tips it 3 times consecutively before finishing. Develops timing, jumping, and soft hands near the rim. 5 sets each side."
court_type: half_court
court_standard: fiba
duration: 8m
intensity: 3
category: offense
tags:
  - rebound
  - tip-in
  - finishing
  - timing
  - technique

sequences:
  - label: "Setup"
    ball_carrier: a1
    instructions:
      - "Players in pairs at the basket"
      - "A1 on right side, A2 on left side"
      - "Each player has a ball"
    players:
      - id: a1
        label: "A1"
        role: attacker
        position: [0.60, 0.15]
      - id: a2
        label: "A2"
        role: attacker
        position: [0.40, 0.15]
    accessories: []
    actions: []

  - label: "3 Tips & Finish"
    ball_carrier: a1
    instructions:
      - "Throw ball off backboard"
      - "Tip it 3 times consecutively (claquettes)"
      - "On the 3rd tip, finish with a layup"
      - "Stay on one side, then switch to the other"
      - "5 sets each side"
    players:
      - id: a1
        label: "A1"
        role: attacker
        position: [0.58, 0.10]
    accessories: []
    actions:
      - type: shot_layup
        from: a1
        to: [0.50, 0.05]

i18n:
  fr:
    name: "Claquettes (3 reprises)"
    description: "Joueurs par paires au panier. Le joueur lance le ballon sur la planche et le reprend 3 fois consecutivement avant de finir. Travail du timing, du saut et de la sensibilite des mains pres du cercle. 5 series de chaque cote."
    tags:
      - rebond
      - claquette
      - finition
      - timing
      - technique
    sequences:
      - label: "Mise en place"
        instructions:
          - "Joueurs par paires au panier"
          - "A1 cote droit, A2 cote gauche"
          - "Chaque joueur a un ballon"
      - label: "3 claquettes et finition"
        instructions:
          - "Lancer le ballon sur la planche"
          - "Reprendre 3 fois consecutivement (claquettes)"
          - "A la 3eme reprise, finir en tir en course"
          - "Rester d'un cote puis changer"
          - "5 series de chaque cote"
