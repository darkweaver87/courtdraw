name: Double Close-Out
description: Defensive close-out drill with recovery and 1v1 finish
court_type: half_court
court_standard: fiba
duration: 15m
intensity: 2
category: defense
tags:
  - close-out
  - 1v1
  - defense

sequences:
  - label: Setup
    ball_carrier: c1
    instructions:
      - D starts under the basket on the baseline
      - A1 and A2 are on the wings (45° spots)
      - Coach (C) is at the top of the key with the ball
    players:
      - id: d1
        label: D
        role: defender
        position: [0.5, 0.12]
      - id: a1
        label: A1
        role: attacker
        position: [0.2, 0.5]
      - id: a2
        label: A2
        role: attacker
        position: [0.8, 0.5]
      - id: c1
        label: C
        role: coach
        position: [0.5, 0.75]
    actions: []
    accessories: []

  - label: "Pass to A1"
    ball_carrier: a1
    instructions:
      - Coach passes to A1
      - A1 catches and faces up (no dribble yet)
    players:
      - id: d1
        label: D
        role: defender
        position: [0.5, 0.12]
      - id: a1
        label: A1
        role: attacker
        position: [0.2, 0.5]
      - id: a2
        label: A2
        role: attacker
        position: [0.8, 0.5]
      - id: c1
        label: C
        role: coach
        position: [0.5, 0.75]
    actions:
      - type: pass
        from: c1
        to: a1
    accessories: []

  - label: "Close-out A1"
    ball_carrier: a1
    instructions:
      - D sprints to close out on A1
    players:
      - id: d1
        label: D
        role: defender
        position: [0.25, 0.48]
      - id: a1
        label: A1
        role: attacker
        position: [0.2, 0.5]
      - id: a2
        label: A2
        role: attacker
        position: [0.8, 0.5]
      - id: c1
        label: C
        role: coach
        position: [0.5, 0.75]
    actions:
      - type: close_out
        from: d1
        to: a1
    accessories: []

  - label: "Pass to A2"
    ball_carrier: a2
    instructions:
      - A1 passes to A2
    players:
      - id: d1
        label: D
        role: defender
        position: [0.25, 0.48]
      - id: a1
        label: A1
        role: attacker
        position: [0.2, 0.5]
      - id: a2
        label: A2
        role: attacker
        position: [0.8, 0.5]
      - id: c1
        label: C
        role: coach
        position: [0.5, 0.75]
    actions:
      - type: pass
        from: a1
        to: a2
    accessories: []

  - label: "Close-out + 1v1 A2"
    ball_carrier: a2
    instructions:
      - D recovers and sprints to close out on A2
      - A2 plays 1v1 against D (2 dribbles max)
    players:
      - id: d1
        label: D
        role: defender
        position: [0.75, 0.48]
      - id: a1
        label: A1
        role: attacker
        position: [0.2, 0.5]
      - id: a2
        label: A2
        role: attacker
        position: [0.8, 0.5]
      - id: c1
        label: C
        role: coach
        position: [0.5, 0.75]
    actions:
      - type: close_out
        from: d1
        to: a2
    accessories: []

i18n:
  fr:
    name: "Double close-out"
    description: "Exercice de close-out defensif avec recuperation et finition en 1 contre 1"
    tags:
      - close-out
      - 1c1
      - défense
    sequences:
      - label: "Mise en place"
        instructions:
          - "D commence sous le panier sur la ligne de fond"
          - "A1 et A2 sont sur les ailes (a 45 degres)"
          - "Le coach (C) est en haut de la raquette avec le ballon"
      - label: "Passe a A1"
        instructions:
          - "Le coach passe a A1"
          - "A1 attrape et fait face (pas de dribble)"
      - label: "Close-out A1"
        instructions:
          - "D sprinte pour fermer sur A1"
      - label: "Passe a A2"
        instructions:
          - "A1 passe a A2"
      - label: "Close-out + 1c1 A2"
        instructions:
          - "D recupere et sprinte pour fermer sur A2"
          - "A2 joue 1 contre 1 face a D (2 dribbles max)"
