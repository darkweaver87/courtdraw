name: "Baseball Pass Fast Break"
description: "3 columns, full court. A throws a baseball pass to C who is sprinting down the far sideline. C catches in stride and finishes with a layup. B fills the trailer lane. Develops long outlet passing accuracy and catching on the move."
court_type: full_court
court_standard: fiba
duration: 8m
intensity: 3
category: offense
tags:
  - fast-break
  - passing
  - baseball-pass
  - transition
  - catching

sequences:
  - label: "Setup"
    ball_carrier: a1
    instructions:
      - "A with ball under the basket"
      - "C on the far sideline ready to sprint"
      - "B at center court as trailer"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.50, 0.90]
      - id: b1
        label: "B"
        role: attacker
        position: [0.50, 0.55]
      - id: c1
        label: "C"
        role: attacker
        position: [0.80, 0.70]
    accessories: []
    actions: []

  - label: "Baseball Pass & Sprint"
    ball_carrier: c1
    instructions:
      - "C sprints down the sideline at full speed"
      - "A throws a baseball pass (one-handed overhand) to C"
      - "C must catch without breaking stride"
      - "B fills the opposite lane as trailer"
      - "Key: pass must lead the runner"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.50, 0.85]
      - id: b1
        label: "B"
        role: attacker
        position: [0.40, 0.35]
      - id: c1
        label: "C"
        role: attacker
        position: [0.80, 0.25]
    accessories: []
    actions:
      - type: pass
        from: a1
        to: c1
      - type: sprint
        from: c1
        to: [0.80, 0.25]

  - label: "Finish"
    ball_carrier: c1
    instructions:
      - "C catches and attacks the basket"
      - "Finish with a layup"
      - "B rebounds, roles rotate: A→B→C→A"
      - "Variant: add a defender at half court"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.50, 0.50]
      - id: b1
        label: "B"
        role: attacker
        position: [0.40, 0.20]
      - id: c1
        label: "C"
        role: attacker
        position: [0.65, 0.10]
    accessories: []
    actions:
      - type: dribble
        from: c1
        to: [0.65, 0.10]
      - type: shot_layup
        from: c1
        to: [0.50, 0.05]

i18n:
  fr:
    name: "Contre-attaque passe baseball"
    description: "3 colonnes, terrain entier. A envoie une passe baseball a C qui sprinte sur la ligne de touche opposee. C attrape en course et finit en tir en course. B remplit le couloir retardataire. Travail de la passe longue et de la reception en mouvement."
    tags:
      - contre-attaque
      - passe
      - passe-baseball
      - transition
      - reception
    sequences:
      - label: "Mise en place"
        instructions:
          - "A avec ballon sous le panier"
          - "C sur la ligne de touche opposee pret a sprinter"
          - "B a mi-terrain comme retardataire"
      - label: "Passe baseball et sprint"
        instructions:
          - "C sprinte sur la ligne de touche a pleine vitesse"
          - "A envoie une passe baseball (une main par-dessus) vers C"
          - "C doit attraper sans casser sa course"
          - "B remplit le couloir oppose comme retardataire"
          - "Cle : la passe doit devancer le coureur"
      - label: "Finition"
        instructions:
          - "C attrape et attaque le panier"
          - "Finition en tir en course"
          - "B prend le rebond, rotation : A→B→C→A"
          - "Variante : ajouter un defenseur a mi-terrain"
