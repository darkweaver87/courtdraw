name: "Guard-Wing 2-Man Game"
description: "2 players (guard + wing). Progression of 2-man actions: pass & flash, pass & go strong side, pass & go weak side, pass & go continuity, pass & follow. Develops reading and executing basic 2-player offensive combinations."
court_type: half_court
court_standard: fiba
duration: 12m
intensity: 3
category: offense
tags:
  - two-man-game
  - pass-and-go
  - guard-wing
  - reads
  - fundamentals

sequences:
  - label: "Setup"
    ball_carrier: a1
    instructions:
      - "Guard (A) with ball at the top of the key"
      - "Wing (B) on the wing"
      - "No defenders initially"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.50, 0.60]
      - id: b1
        label: "B"
        role: attacker
        position: [0.80, 0.40]
    accessories: []
    actions: []

  - label: "Pass & Go Strong Side"
    ball_carrier: b1
    instructions:
      - "A passes to B on the wing"
      - "A cuts through the lane (strong side)"
      - "A can stop in the paint (sector 5) for post position"
      - "Or A can exit to the corner (sector 0)"
      - "B reads A's cut and returns the ball if open"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.70, 0.20]
      - id: b1
        label: "B"
        role: attacker
        position: [0.80, 0.40]
    accessories: []
    actions:
      - type: pass
        from: a1
        to: b1
      - type: cut
        from: a1
        to: [0.70, 0.20]

  - label: "Pass & Go Continuity"
    ball_carrier: a1
    instructions:
      - "A pass & go with B, exits ball-side in sector 0"
      - "B chains pass & go with A toward sector 2"
      - "A repositions in dribble to sector 3"
      - "A chains pass & go with B again"
      - "Continuous back-and-forth — no stopping"
      - "Add defenders after mastering the movement"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.50, 0.55]
      - id: b1
        label: "B"
        role: attacker
        position: [0.65, 0.30]
    accessories: []
    actions:
      - type: pass
        from: a1
        to: b1
      - type: cut
        from: a1
        to: [0.70, 0.20]
      - type: pass
        from: b1
        to: a1

i18n:
  fr:
    name: "Jeu a 2 meneur-ailier"
    description: "2 joueurs (meneur + ailier). Progression des actions a 2 : passe et flash, passe et va cote fort, passe et va cote faible, passe et va en continuite, passe et suit. Travail de la lecture et de l'execution des combinaisons offensives a 2 joueurs."
    tags:
      - jeu-a-deux
      - passe-et-va
      - meneur-ailier
      - lecture
      - fondamentaux
    sequences:
      - label: "Mise en place"
        instructions:
          - "Meneur (A) avec ballon en tete de raquette"
          - "Ailier (B) sur l'aile"
          - "Pas de defenseurs au debut"
      - label: "Passe et va cote fort"
        instructions:
          - "A passe a B sur l'aile"
          - "A coupe dans la zone reservee (cote fort)"
          - "A peut s'arreter dans la raquette (secteur 5) en position poste"
          - "Ou A peut ressortir au corner (secteur 0)"
          - "B lit la coupe de A et remet le ballon si ouvert"
      - label: "Passe et va en continuite"
        instructions:
          - "A passe et va avec B, ressort cote ballon en secteur 0"
          - "B enchaine passe et va avec A vers le secteur 2"
          - "A se replace en dribble vers le secteur 3"
          - "A enchaine passe et va avec B"
          - "Continu aller-retour — pas d'arret"
          - "Ajouter des defenseurs apres maitrise du mouvement"
