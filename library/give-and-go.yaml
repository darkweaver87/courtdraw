name: "Give and Go"
description: "Classic pass-and-cut play to beat a defender and finish at the rim"
court_type: half_court
court_standard: fiba
duration: 10m
intensity: 2
category: offense
tags:
  - offense
  - passing
  - cutting
  - layup
  - 2v1
  - U13
  - U15

sequences:
  - label: "Setup"
    ball_carrier: a1
    instructions:
      - "A1 has the ball at the top of the key"
      - "A2 is on the wing"
      - "D1 guards A1"
    players:
      - id: a1
        label: "A1"
        role: attacker
        position: [0.50, 0.75]
      - id: a2
        label: "A2"
        role: attacker
        position: [0.20, 0.55]
      - id: d1
        label: "D"
        role: defender
        position: [0.45, 0.70]
    accessories: []
    actions: []

  - label: "Pass"
    ball_carrier: a2
    instructions:
      - "A1 passes to A2 on the wing"
    players:
      - id: a1
        label: "A1"
        role: attacker
        position: [0.50, 0.75]
      - id: a2
        label: "A2"
        role: attacker
        position: [0.20, 0.55]
      - id: d1
        label: "D"
        role: defender
        position: [0.45, 0.70]
    accessories: []
    actions:
      - type: pass
        from: a1
        to: a2

  - label: "Cut"
    ball_carrier: a2
    instructions:
      - "A1 cuts to the basket (backdoor)"
      - "D1 watches the ball — A1 slips behind"
    players:
      - id: a1
        label: "A1"
        role: attacker
        position: [0.40, 0.35]
      - id: a2
        label: "A2"
        role: attacker
        position: [0.20, 0.55]
      - id: d1
        label: "D"
        role: defender
        position: [0.35, 0.60]
    accessories: []
    actions:
      - type: cut
        from: a1
        to: [0.40, 0.35]

  - label: "Return Pass"
    ball_carrier: a1
    instructions:
      - "A2 returns the pass to A1 cutting to the basket"
      - "A1 receives in stride"
    players:
      - id: a1
        label: "A1"
        role: attacker
        position: [0.50, 0.15]
      - id: a2
        label: "A2"
        role: attacker
        position: [0.20, 0.55]
      - id: d1
        label: "D"
        role: defender
        position: [0.40, 0.40]
    accessories: []
    actions:
      - type: pass
        from: a2
        to: a1

  - label: "Layup"
    ball_carrier: a1
    instructions:
      - "A1 finishes with a layup"
    players:
      - id: a1
        label: "A1"
        role: attacker
        position: [0.50, 0.10]
      - id: a2
        label: "A2"
        role: attacker
        position: [0.20, 0.55]
      - id: d1
        label: "D"
        role: defender
        position: [0.40, 0.40]
    accessories: []
    actions:
      - type: shot_layup
        from: a1
        to: [0.50, 0.05]

i18n:
  fr:
    name: "Passe et va"
    description: "Jeu classique de passe et coupe pour battre un defenseur et finir au cercle"
    tags:
      - attaque
      - passes
      - coupes
      - layup
      - 2c1
      - U13
      - U15
    sequences:
      - label: "Mise en place"
        instructions:
          - "A1 a le ballon en haut de la raquette"
          - "A2 est sur l'aile"
          - "D1 defend sur A1"
      - label: "Passe"
        instructions:
          - "A1 passe a A2 sur l'aile"
      - label: "Coupe"
        instructions:
          - "A1 coupe vers le panier (backdoor)"
          - "D1 regarde le ballon — A1 se faufile derriere"
      - label: "Passe en retour"
        instructions:
          - "A2 repasse le ballon a A1 qui coupe vers le panier"
          - "A1 recoit en course"
      - label: "Layup"
        instructions:
          - "A1 finit avec un layup"
