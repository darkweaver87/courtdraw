name: "Jump Shot Catch & Shoot"
description: "1 column of players with balls. A goes under the basket back to baseline, sprints out to the wing at 45 degrees. B passes to A who catches and shoots. Vary: shot fake + 1 dribble, crossover + shot. Work both sides."
court_type: half_court
court_standard: fiba
duration: 10m
intensity: 2
category: offense
tags:
  - shooting
  - jump-shot
  - catch-and-shoot
  - v-cut
  - technique

sequences:
  - label: "Setup"
    ball_carrier: b1
    instructions:
      - "1 column of players with balls (except first)"
      - "A starts at the wing, B has the ball in the column"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.75, 0.55]
      - id: b1
        label: "B"
        role: attacker
        position: [0.50, 0.80]
      - id: qb
        label: "B"
        role: attacker
        type: queue
        count: 4
        position: [0.50, 0.85]
    accessories: []
    actions: []

  - label: "V-Cut & Shoot"
    ball_carrier: a1
    instructions:
      - "A goes under the basket, back to baseline"
      - "A sprints to the wing (45 degree angle at the extended free throw line)"
      - "B passes to A who catches, orients and shoots"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.75, 0.40]
      - id: b1
        label: "B"
        role: attacker
        position: [0.50, 0.80]
    accessories: []
    actions:
      - type: cut
        from: a1
        to: [0.75, 0.40]
      - type: pass
        from: b1
        to: a1
      - type: shot_jumpshot
        from: a1
        to: [0.50, 0.05]

  - label: "Variants"
    instructions:
      - "After catch: direct shot, shot fake + dribble + shot"
      - "After catch: shot fake, crossover dribble + shot"
      - "After catch: shot fake, direct drive + shot"
      - "Work both right and left sides"
      - "Variant: 2 columns, 2 cones for simultaneous work"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.25, 0.40]
      - id: b1
        label: "B"
        role: attacker
        position: [0.50, 0.80]
    accessories: []
    actions: []

i18n:
  fr:
    name: "Tir en suspension reception-tir"
    description: "1 colonne de joueurs avec ballons. A va sous le cercle dos a la ligne de fond, sprinte vers l'aile a 45 degres. B passe a A qui recoit et tire. Variantes : feinte de tir + 1 dribble, depart croise + tir. Travailler des deux cotes."
    tags:
      - tir
      - tir-en-suspension
      - reception-tir
      - coupe-en-v
      - technique
    sequences:
      - label: "Mise en place"
        instructions:
          - "1 colonne de joueurs avec ballons (sauf le 1er)"
          - "A commence sur l'aile, B a le ballon dans la colonne"
      - label: "Coupe en V et tir"
        instructions:
          - "A va sous le cercle, dos a la ligne de fond"
          - "A sprinte vers l'aile (angle de 45 degres, ligne de lancer-francs prolongee)"
          - "B passe a A qui recoit, s'oriente et tire"
      - label: "Variantes"
        instructions:
          - "Apres reception : tir direct, feinte de tir + dribble + tir"
          - "Apres reception : feinte de tir, depart croise + tir"
          - "Apres reception : feinte de tir, depart direct + tir"
          - "Travailler cote droit et cote gauche"
          - "Variante : 2 colonnes, 2 plots pour travail simultane"
