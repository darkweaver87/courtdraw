name: "Spot Shooting Competition"
description: "Teams of 2 players, 1 ball each. Each player must hit a shot at each of 7-12 spots around the key (in order). First team to complete all spots wins. Develops shooting accuracy under competitive pressure."
court_type: half_court
court_standard: fiba
duration: 10m
intensity: 2
category: offense
tags:
  - shooting
  - competition
  - spots
  - accuracy
  - game

sequences:
  - label: "Setup"
    instructions:
      - "2 teams of 2 players, 1 ball per player"
      - "7 to 12 spots marked around the key"
      - "Each player shoots from spot 1, moves to spot 2 only when they make it"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.30, 0.80]
      - id: b1
        label: "B"
        role: attacker
        position: [0.70, 0.80]
    accessories:
      - type: cone
        id: c1
        position: [0.25, 0.55]
      - type: cone
        id: c2
        position: [0.25, 0.40]
      - type: cone
        id: c3
        position: [0.35, 0.25]
      - type: cone
        id: c4
        position: [0.50, 0.20]
      - type: cone
        id: c5
        position: [0.65, 0.25]
      - type: cone
        id: c6
        position: [0.75, 0.40]
      - type: cone
        id: c7
        position: [0.75, 0.55]
    actions: []

  - label: "Compete"
    ball_carrier: a1
    instructions:
      - "Each player must make a shot at each spot in order"
      - "When a player makes it, they advance to the next spot"
      - "When both teammates have completed all spots, team wins"
      - "If you miss, retrieve your rebound and shoot again from the same spot"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.25, 0.55]
      - id: b1
        label: "B"
        role: attacker
        position: [0.75, 0.55]
    accessories:
      - type: cone
        id: c1
        position: [0.25, 0.55]
      - type: cone
        id: c2
        position: [0.25, 0.40]
      - type: cone
        id: c3
        position: [0.35, 0.25]
      - type: cone
        id: c4
        position: [0.50, 0.20]
      - type: cone
        id: c5
        position: [0.65, 0.25]
      - type: cone
        id: c6
        position: [0.75, 0.40]
      - type: cone
        id: c7
        position: [0.75, 0.55]
    actions:
      - type: shot_jumpshot
        from: a1
        to: [0.50, 0.05]

  - label: "Variant"
    instructions:
      - "Variant: 3 players per team, timed competition (3 min)"
      - "Each player dribbles to basket for 2-pt shot, returns"
      - "If 2-pt is made, next shot is a 3-pointer"
      - "If 2-pt is missed, next shot is a layup"
      - "3rd shot is always a 2-pointer, and cycle repeats"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.30, 0.80]
      - id: b1
        label: "B"
        role: attacker
        position: [0.70, 0.80]
    accessories:
      - type: cone
        id: c1
        position: [0.35, 0.45]
      - type: cone
        id: c2
        position: [0.65, 0.45]
    actions: []

i18n:
  fr:
    name: "Concours de tir par spots"
    description: "Equipes de 2 joueurs, 1 ballon chacun. Chaque joueur doit reussir un tir a chacun des 7-12 spots autour de la raquette (dans l'ordre). La premiere equipe a completer tous les spots gagne. Travail de la precision sous pression competitive."
    tags:
      - tir
      - competition
      - spots
      - precision
      - jeu
    sequences:
      - label: "Mise en place"
        instructions:
          - "2 equipes de 2 joueurs, 1 ballon par joueur"
          - "7 a 12 spots marques autour de la raquette"
          - "Chaque joueur tire du spot 1, avance au spot 2 uniquement s'il a reussi"
      - label: "Competition"
        instructions:
          - "Chaque joueur doit reussir un tir a chaque spot dans l'ordre"
          - "Quand un joueur reussit, il avance au spot suivant"
          - "Quand les deux coequipiers ont termine tous les spots, l'equipe gagne"
          - "Si rate, recuperer le rebond et retirer du meme spot"
      - label: "Variante"
        instructions:
          - "Variante : 3 joueurs par equipe, concours chronometre (3 min)"
          - "Chaque joueur dribble vers le panier pour un tir a 2 pts, revient"
          - "Si le 2 pts est reussi, le prochain tir est a 3 pts"
          - "Si le 2 pts est rate, le prochain tir est un tir en course"
          - "Le 3eme tir est toujours a 2 pts, et le cycle recommence"
