name: "Zone Offense Interior-Exterior Relations"
description: "5 players (2 interiors + 2 exteriors + 1 passer). Interior player posts up, receives pass, and plays 1v1 or kicks out. Exterior players relocate for catch-and-shoot opportunities. Alternating interior-exterior game to stretch and collapse the zone defense."
court_type: half_court
court_standard: fiba
duration: 12m
intensity: 3
category: offense
tags:
  - zone-offense
  - interior-exterior
  - post-play
  - catch-and-shoot
  - team-offense

sequences:
  - label: "Setup"
    ball_carrier: p1
    instructions:
      - "Passer (P) at the top with ball"
      - "Exterior 1 (E1) on the left wing"
      - "Exterior 2 (E2) on the right baseline"
      - "Interior 1 (I1) at the right block"
      - "Interior 2 (I2) at the left block"
    players:
      - id: p1
        label: "P"
        role: attacker
        position: [0.50, 0.55]
      - id: e1
        label: "E1"
        role: attacker
        position: [0.15, 0.40]
      - id: e2
        label: "E2"
        role: attacker
        position: [0.85, 0.15]
      - id: i1
        label: "I1"
        role: attacker
        position: [0.60, 0.15]
      - id: i2
        label: "I2"
        role: attacker
        position: [0.35, 0.15]
    accessories: []
    actions: []

  - label: "Interior Entry"
    ball_carrier: i1
    instructions:
      - "I1 flashes to the high post to receive from P"
      - "I1 plays handoff with E1 cutting through"
      - "I1 cuts to the low post opposite"
      - "E1 drives, reads the zone: shoot or pass to I1"
      - "If no option, E1 passes back to P for reset"
    players:
      - id: p1
        label: "P"
        role: attacker
        position: [0.50, 0.55]
      - id: e1
        label: "E1"
        role: attacker
        position: [0.30, 0.30]
      - id: e2
        label: "E2"
        role: attacker
        position: [0.85, 0.15]
      - id: i1
        label: "I1"
        role: attacker
        position: [0.50, 0.30]
      - id: i2
        label: "I2"
        role: attacker
        position: [0.35, 0.15]
    accessories: []
    actions:
      - type: pass
        from: p1
        to: i1
      - type: pass
        from: i1
        to: e1

  - label: "Kick Out & Shoot"
    ball_carrier: e2
    instructions:
      - "E1 penetrates and draws zone defenders inside"
      - "E1 kicks out to E2 on the baseline for catch-and-shoot"
      - "I2 crashes the offensive boards"
      - "Scoring: catch-and-shoot 3pt = 3, interior layup = 2"
      - "Shot after 1 dribble = 1 point"
      - "First to 15 points"
    players:
      - id: p1
        label: "P"
        role: attacker
        position: [0.50, 0.55]
      - id: e1
        label: "E1"
        role: attacker
        position: [0.40, 0.20]
      - id: e2
        label: "E2"
        role: attacker
        position: [0.80, 0.15]
      - id: i1
        label: "I1"
        role: attacker
        position: [0.55, 0.15]
      - id: i2
        label: "I2"
        role: attacker
        position: [0.40, 0.10]
    accessories: []
    actions:
      - type: pass
        from: e1
        to: e2
      - type: shot_jumpshot
        from: e2
        to: [0.50, 0.05]

i18n:
  fr:
    name: "Attaque de zone : relations interieur-exterieur"
    description: "5 joueurs (2 interieurs + 2 exterieurs + 1 passeur). Le joueur interieur prend position au poste, recoit la passe et joue le 1c1 ou ressort. Les exterieurs se replacent pour des tirs apres reception. Alternance jeu interieur-exterieur pour etirer et compresser la zone."
    tags:
      - attaque-de-zone
      - interieur-exterieur
      - jeu-de-poste
      - tir-apres-reception
      - jeu-collectif
    sequences:
      - label: "Mise en place"
        instructions:
          - "Passeur (P) au sommet avec le ballon"
          - "Exterieur 1 (E1) sur l'aile gauche"
          - "Exterieur 2 (E2) sur la ligne de fond droite"
          - "Interieur 1 (I1) au bloc droit"
          - "Interieur 2 (I2) au bloc gauche"
      - label: "Entree interieure"
        instructions:
          - "I1 flashe au poste haut pour recevoir de P"
          - "I1 joue le main a main avec E1 qui coupe"
          - "I1 coupe au poste bas oppose"
          - "E1 penetre, lit la zone : tirer ou passer a I1"
          - "Si pas d'option, E1 repasse a P pour le reset"
      - label: "Sortie et tir"
        instructions:
          - "E1 penetre et attire les defenseurs de zone a l'interieur"
          - "E1 ressort sur E2 en ligne de fond pour un tir apres reception"
          - "I2 plonge au rebond offensif"
          - "Scoring : tir a 3pts apres reception = 3, tir en course interieur = 2"
          - "Tir apres 1 dribble = 1 point"
          - "Premier a 15 points"
