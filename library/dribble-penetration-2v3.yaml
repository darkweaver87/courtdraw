name: "Penetration Dribble 2v3"
description: "2 attackers with ball must dribble through 3 defenders positioned in lanes. Defenders stay in their lane. Develops fixation dribble and penetration."
court_type: half_court
court_standard: fiba
duration: 10m
intensity: 2
category: offense
tags:
  - dribble
  - penetration
  - 2v3
  - fixation
  - ball-handling

sequences:
  - label: "Setup"
    ball_carrier: a1
    instructions:
      - "2 attackers with ball each, at the top of the key"
      - "3 defenders, 1 per lane (left, center, right)"
      - "Defenders must stay in their lane"
    players:
      - id: a1
        label: "A1"
        role: attacker
        position: [0.30, 0.85]
      - id: a2
        label: "A2"
        role: attacker
        position: [0.70, 0.85]
      - id: d1
        label: "D1"
        role: defender
        position: [0.20, 0.50]
      - id: d2
        label: "D2"
        role: defender
        position: [0.50, 0.50]
      - id: d3
        label: "D3"
        role: defender
        position: [0.80, 0.50]
    accessories: []
    actions: []

  - label: "Attack"
    ball_carrier: a1
    instructions:
      - "Attackers try to dribble past the defenders"
      - "Defenders slide laterally within their lane to block"
      - "Attackers must use change of pace and direction"
    players:
      - id: a1
        label: "A1"
        role: attacker
        position: [0.35, 0.55]
      - id: a2
        label: "A2"
        role: attacker
        position: [0.65, 0.55]
      - id: d1
        label: "D1"
        role: defender
        position: [0.25, 0.48]
      - id: d2
        label: "D2"
        role: defender
        position: [0.45, 0.48]
      - id: d3
        label: "D3"
        role: defender
        position: [0.75, 0.48]
    accessories: []
    actions:
      - type: dribble
        from: a1
        to: [0.35, 0.55]
      - type: dribble
        from: a2
        to: [0.65, 0.55]

  - label: "Finish"
    ball_carrier: a1
    instructions:
      - "Attackers who get through score at the rim"
      - "Rotation: defender whose lane was beaten goes to offense"
      - "The 2 other defenders stay, those 2 become attackers"
    players:
      - id: a1
        label: "A1"
        role: attacker
        position: [0.40, 0.12]
      - id: a2
        label: "A2"
        role: attacker
        position: [0.60, 0.12]
      - id: d1
        label: "D1"
        role: defender
        position: [0.25, 0.25]
      - id: d2
        label: "D2"
        role: defender
        position: [0.50, 0.25]
      - id: d3
        label: "D3"
        role: defender
        position: [0.75, 0.25]
    accessories: []
    actions:
      - type: shot_layup
        from: a1
        to: [0.50, 0.05]

i18n:
  fr:
    name: "Dribble de penetration 2c3"
    description: "2 attaquants avec ballon doivent passer en dribble a travers 3 defenseurs positionnes dans des couloirs. Les defenseurs restent dans leur couloir. Travail de fixation et penetration."
    tags:
      - dribble
      - penetration
      - 2c3
      - fixation
      - conduite-de-balle
    sequences:
      - label: "Mise en place"
        instructions:
          - "2 attaquants avec ballon chacun, en haut de la raquette"
          - "3 defenseurs, 1 par couloir (gauche, centre, droite)"
          - "Les defenseurs doivent rester dans leur couloir"
      - label: "Attaque"
        instructions:
          - "Les attaquants tentent de passer les defenseurs en dribble"
          - "Les defenseurs glissent lateralement dans leur couloir pour bloquer"
          - "Les attaquants doivent utiliser des changements de rythme et de direction"
      - label: "Finition"
        instructions:
          - "Les attaquants qui passent marquent au cercle"
          - "Rotation : le defenseur dont le couloir a ete perce passe en attaque"
          - "Les 2 autres defenseurs restent, les 2 nouveaux deviennent attaquants"
