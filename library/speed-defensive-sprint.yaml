name: "Defensive Speed Drill"
description: "3 attackers, 3 defenders, 1 ball. Ball handler's defender chains all defensive placements relative to the ball. On return pass, defender must arrive at the same time to intercept. Off-ball defenders must not anticipate — they sprint during ball flight only. 2 sets of 5 reps, 2 min rest between reps, 6 min between sets. Develops defensive movement speed."
court_type: half_court
court_standard: fiba
duration: 10m
intensity: 5
category: defense
tags:
  - speed
  - defense
  - footwork
  - conditioning
  - reaction

sequences:
  - label: "Setup"
    ball_carrier: a1
    instructions:
      - "3 attackers (A, B, C) in a triangle"
      - "A with ball at the top"
      - "B and C on the wings"
      - "3 defenders in help positions"
      - "Ball handler's defender chains all defensive placements"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.50, 0.55]
      - id: b1
        label: "B"
        role: attacker
        position: [0.20, 0.30]
      - id: c1
        label: "C"
        role: attacker
        position: [0.80, 0.30]
      - id: d1
        label: "D1"
        role: defender
        position: [0.45, 0.50]
      - id: d2
        label: "D2"
        role: defender
        position: [0.30, 0.35]
      - id: d3
        label: "D3"
        role: defender
        position: [0.70, 0.35]
    accessories: []
    actions: []

  - label: "Sprint on Pass"
    ball_carrier: b1
    instructions:
      - "A passes to C, all defenders adjust positions"
      - "C passes to B, defenders sprint during ball flight"
      - "Key: defenders don't anticipate, only move during flight"
      - "On return pass to A, defender must arrive to intercept"
      - "Ball handler's defender goes through all stances"
      - "2 sets of 5 reps, 2 min rest between reps, 6 min between sets"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.50, 0.55]
      - id: b1
        label: "B"
        role: attacker
        position: [0.20, 0.30]
      - id: c1
        label: "C"
        role: attacker
        position: [0.80, 0.30]
      - id: d1
        label: "D1"
        role: defender
        position: [0.30, 0.40]
      - id: d2
        label: "D2"
        role: defender
        position: [0.25, 0.28]
      - id: d3
        label: "D3"
        role: defender
        position: [0.60, 0.40]
    accessories: []
    actions:
      - type: pass
        from: b1
        to: a1

