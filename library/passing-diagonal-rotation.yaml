name: "Diagonal Passing Rotation"
description: "4 groups in corners of half-court with 2 balls. Passes go diagonally, players rotate to the adjacent corner (counter-clockwise). Develops passing accuracy in movement."
court_type: half_court
court_standard: fiba
duration: 8m
intensity: 2
category: offense
tags:
  - passing
  - movement
  - rotation
  - 4-groups
  - coordination

sequences:
  - label: "Setup"
    ball_carrier: a1
    instructions:
      - "4 groups at the 4 corners of the half-court"
      - "2 balls: group A (bottom-left) and group B (top-right)"
      - "Passes go diagonally"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.15, 0.90]
      - id: b1
        label: "B"
        role: attacker
        position: [0.85, 0.40]
      - id: c1
        label: "C"
        role: attacker
        position: [0.85, 0.90]
      - id: d1
        label: "D"
        role: attacker
        position: [0.15, 0.40]
      - id: qa
        label: "A"
        role: attacker
        type: queue
        count: 3
        position: [0.10, 0.93]
      - id: qb
        label: "B"
        role: attacker
        type: queue
        count: 3
        position: [0.90, 0.37]
      - id: qc
        label: "C"
        role: attacker
        type: queue
        count: 3
        position: [0.90, 0.93]
      - id: qd
        label: "D"
        role: attacker
        type: queue
        count: 3
        position: [0.10, 0.37]
    accessories: []
    actions: []

  - label: "Pass & Rotate"
    ball_carrier: d1
    instructions:
      - "A passes diagonally to B, then runs to D's corner (counter-clockwise)"
      - "B passes diagonally to A's corner (now occupied by next player)"
      - "After passing, rotate to the adjacent group"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.15, 0.55]
      - id: b1
        label: "B"
        role: attacker
        position: [0.85, 0.75]
      - id: c1
        label: "C"
        role: attacker
        position: [0.85, 0.90]
      - id: d1
        label: "D"
        role: attacker
        position: [0.15, 0.40]
    accessories: []
    actions:
      - type: pass
        from: a1
        to: d1
      - type: sprint
        from: a1
        to: [0.15, 0.55]
      - type: pass
        from: b1
        to: c1

  - label: "Continue"
    instructions:
      - "Continuous rotation — adapt distances to pass type and player strength"
      - "Variant: reverse direction (clockwise)"
      - "Variant: vary pass types (chest, bounce, one-hand, overhead)"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.15, 0.40]
      - id: b1
        label: "B"
        role: attacker
        position: [0.85, 0.90]
      - id: c1
        label: "C"
        role: attacker
        position: [0.15, 0.90]
      - id: d1
        label: "D"
        role: attacker
        position: [0.85, 0.40]
    accessories: []
    actions:
      - type: pass
        from: d1
        to: c1
      - type: pass
        from: b1
        to: a1

i18n:
  fr:
    name: "Passes en diagonale avec rotation"
    description: "4 groupes aux coins du demi-terrain avec 2 ballons. Les passes se font en diagonale, les joueurs pivotent vers le coin adjacent (sens anti-horaire). Travail de precision de passe en mouvement."
    tags:
      - passe
      - mouvement
      - rotation
      - 4-groupes
      - coordination
    sequences:
      - label: "Mise en place"
        instructions:
          - "4 groupes aux 4 coins du demi-terrain"
          - "2 ballons : groupe A (bas-gauche) et groupe B (haut-droite)"
          - "Les passes se font en diagonale"
      - label: "Passe et rotation"
        instructions:
          - "A passe en diagonale a B, puis court vers le coin de D (sens anti-horaire)"
          - "B passe en diagonale vers le coin de A (maintenant occupe par le joueur suivant)"
          - "Apres la passe, pivoter vers le groupe adjacent"
      - label: "Enchainement"
        instructions:
          - "Rotation continue — adapter les distances au type de passe et a la force des joueurs"
          - "Variante : inverser le sens (horaire)"
          - "Variante : varier les types de passes (directes, a terre, a une main, au-dessus de la tete)"
