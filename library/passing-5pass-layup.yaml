name: "5-Pass Layup Challenge"
description: "3 columns of 3 players on baseline. Groups advance in their lanes making passes and must score a layup after exactly 5 passes. Goal: 10 consecutive baskets. A miss resets the count to zero."
court_type: full_court
court_standard: fiba
duration: 10m
intensity: 3
category: offense
tags:
  - passing
  - layup
  - transition
  - teamwork
  - challenge

sequences:
  - label: "Setup"
    ball_carrier: a1
    instructions:
      - "3 columns of 3 players behind the baseline"
      - "Middle column (A) has the ball"
      - "Goal: score 10 consecutive baskets"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.50, 0.92]
      - id: b1
        label: "B"
        role: attacker
        position: [0.15, 0.92]
      - id: c1
        label: "C"
        role: attacker
        position: [0.85, 0.92]
      - id: qb
        label: "B"
        role: attacker
        type: queue
        count: 2
        position: [0.15, 0.97]
      - id: qa
        label: "A"
        role: attacker
        type: queue
        count: 2
        position: [0.50, 0.97]
      - id: qc
        label: "C"
        role: attacker
        type: queue
        count: 2
        position: [0.85, 0.97]
    accessories: []
    actions: []

  - label: "5 Passes"
    ball_carrier: c1
    instructions:
      - "3 players advance in their lanes making passes"
      - "Must complete exactly 5 passes before the layup"
      - "Ball must not touch the floor"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.50, 0.55]
      - id: b1
        label: "B"
        role: attacker
        position: [0.15, 0.50]
      - id: c1
        label: "C"
        role: attacker
        position: [0.85, 0.50]
    accessories: []
    actions:
      - type: pass
        from: a1
        to: b1
      - type: pass
        from: b1
        to: c1

  - label: "Finish"
    ball_carrier: a1
    instructions:
      - "Last pass leads to a layup"
      - "Next group takes the rebound (no bounce!) and goes the other way"
      - "A missed basket or lost ball resets the counter to zero"
      - "Variant: after a miss, next group has only 3 passes"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.40, 0.10]
      - id: b1
        label: "B"
        role: attacker
        position: [0.20, 0.15]
      - id: c1
        label: "C"
        role: attacker
        position: [0.70, 0.15]
    accessories: []
    actions:
      - type: shot_layup
        from: a1
        to: [0.50, 0.05]

i18n:
  fr:
    name: "Defi 5 passes + tir en course"
    description: "3 colonnes de 3 joueurs sur la ligne de fond. Les groupes avancent dans leurs couloirs en se faisant des passes et doivent marquer en tir en course apres exactement 5 passes. Objectif : 10 paniers consecutifs. Un rate remet le compteur a zero."
    tags:
      - passe
      - tir-en-course
      - transition
      - collectif
      - defi
    sequences:
      - label: "Mise en place"
        instructions:
          - "3 colonnes de 3 joueurs derriere la ligne de fond"
          - "La colonne du milieu (A) a le ballon"
          - "Objectif : marquer 10 paniers consecutifs"
      - label: "5 passes"
        instructions:
          - "Les 3 joueurs avancent dans leurs couloirs en se faisant des passes"
          - "Il faut exactement 5 passes avant le tir en course"
          - "Le ballon ne doit pas toucher le sol"
      - label: "Finition"
        instructions:
          - "La derniere passe mene au tir en course"
          - "Le groupe suivant prend le rebond (sans que le ballon ne touche le sol) et repart dans l'autre sens"
          - "Un panier manque ou une balle perdue remet le compteur a zero"
          - "Variante : apres un rate, le groupe suivant n'a que 3 passes"
