name: "Run and Trap Defense"
description: "Full court man-to-man press with double-team trap. D1 forces the ball handler toward the sideline, D2 sprints to form a trap. D3 and D4 rotate to cover."
court_type: full_court
court_standard: fiba
duration: 15m
intensity: 3
category: defense
tags:
  - defense
  - pressing
  - run-and-trap
  - trap
  - rotation
  - full-court
  - 5v5

