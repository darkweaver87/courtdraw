i18n:
  fr:
    name: "Defense Run and Trap"
    description: "Pressing tout terrain homme a homme avec prise a deux (trap). D1 oriente le porteur vers la ligne de touche, D2 sprinte pour former la trappe. D3 et D4 effectuent la rotation."
    tags:
      - defense
      - pressing
      - run-and-trap
      - trappe
      - rotation
      - tout-terrain
      - 5c5
    sequences:
      - label: "Mise en place"
        instructions:
          - "Pressing 5c5 homme a homme sur la remise en jeu"
          - "D1 oriente le porteur vers la ligne de touche"
          - "Objectif : creer des prises a deux sur la ligne de touche"
      - label: "Trappe"
        instructions:
          - "D1 oriente le porteur vers la ligne de touche"
          - "D2, partenaire cote ballon le plus proche, sprinte pour former la trappe avec D1"
          - "Prise a deux sur la ligne de touche"
      - label: "Rotation"
        instructions:
          - "D3, defenseur en aide le plus proche, pivote pour couvrir le joueur de D2 (A2)"
          - "D4 prend le joueur de D3 (A3) et forme un triangle avec les 2 attaquants"
          - "D5 reste sur A5"
          - "La trappe force une mauvaise passe ou une perte de balle"
