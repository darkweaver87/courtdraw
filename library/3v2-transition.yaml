name: "3v2 Transition"
description: "Fast break 3v2 continuous drill"
court_type: full_court
court_standard: fiba
duration: 12m
intensity: 2
category: transition
tags:
  - transition
  - fast-break
  - 3v2
  - passing
  - conditioning

sequences:
  - label: "Setup"
    ball_carrier: a1
    instructions:
      - "3 attackers at the baseline"
      - "2 defenders at half-court"
      - "Ball starts with A1 in the middle"
    players:
      - id: a1
        label: "1"
        role: point_guard
        position: [0.50, 0.95]
      - id: a2
        label: "2"
        role: shooting_guard
        position: [0.20, 0.90]
      - id: a3
        label: "3"
        role: small_forward
        position: [0.80, 0.90]
      - id: d1
        label: "D1"
        role: defender
        position: [0.40, 0.50]
      - id: d2
        label: "D2"
        role: defender
        position: [0.60, 0.50]
    accessories: []
    actions: []

  - label: "Push"
    ball_carrier: a1
    instructions:
      - "A1 pushes the ball up the middle"
      - "A2 and A3 fill the wings"
      - "Attack the 3v2 advantage"
    players:
      - id: a1
        label: "1"
        role: point_guard
        position: [0.50, 0.30]
      - id: a2
        label: "2"
        role: shooting_guard
        position: [0.15, 0.25]
      - id: a3
        label: "3"
        role: small_forward
        position: [0.85, 0.25]
      - id: d1
        label: "D1"
        role: defender
        position: [0.35, 0.20]
      - id: d2
        label: "D2"
        role: defender
        position: [0.65, 0.20]
    accessories: []
    actions:
      - type: dribble
        from: a1
        to: [0.50, 0.30]
      - type: sprint
        from: a2
        to: [0.15, 0.25]
      - type: sprint
        from: a3
        to: [0.85, 0.25]

  - label: "Kick Out"
    ball_carrier: a2
    instructions:
      - "A1 passes to A2 on the wing"
      - "Ball should NOT hit the floor past half-court"
    players:
      - id: a1
        label: "1"
        role: point_guard
        position: [0.50, 0.30]
      - id: a2
        label: "2"
        role: shooting_guard
        position: [0.15, 0.25]
      - id: a3
        label: "3"
        role: small_forward
        position: [0.85, 0.25]
      - id: d1
        label: "D1"
        role: defender
        position: [0.35, 0.20]
      - id: d2
        label: "D2"
        role: defender
        position: [0.65, 0.20]
    accessories: []
    actions:
      - type: pass
        from: a1
        to: a2

  - label: "Finish"
    ball_carrier: a2
    instructions:
      - "Wing player finishes at the rim"
      - "3 attackers become 2 defenders"
      - "Next group starts from other end"
    players:
      - id: a1
        label: "1"
        role: point_guard
        position: [0.50, 0.25]
      - id: a2
        label: "2"
        role: shooting_guard
        position: [0.30, 0.08]
      - id: a3
        label: "3"
        role: small_forward
        position: [0.80, 0.15]
      - id: d1
        label: "D1"
        role: defender
        position: [0.35, 0.12]
      - id: d2
        label: "D2"
        role: defender
        position: [0.55, 0.15]
    accessories: []
    actions:
      - type: shot_layup
        from: a2
        to: [0.50, 0.05]

i18n:
  fr:
    name: "Transition 3c2"
    description: "Exercice de contre-attaque 3 contre 2 en continu"
    tags:
      - transition
      - contre-attaque
      - 3c2
      - passes
      - physique
    sequences:
      - label: "Mise en place"
        instructions:
          - "3 attaquants sur la ligne de fond"
          - "2 defenseurs au milieu du terrain"
          - "Le ballon commence avec A1 au centre"
      - label: "Montee"
        instructions:
          - "A1 monte le ballon au centre"
          - "A2 et A3 remplissent les ailes"
          - "Exploiter le surnombre 3 contre 2"
      - label: "Decalage"
        instructions:
          - "A1 passe a A2 sur l'aile"
          - "Le ballon ne doit PAS toucher le sol passe le milieu de terrain"
      - label: "Finition"
        instructions:
          - "L'ailier finit au cercle"
          - "Les 3 attaquants deviennent 2 defenseurs"
          - "Le groupe suivant part de l'autre cote"
