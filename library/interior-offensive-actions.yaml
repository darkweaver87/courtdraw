name: "Interior Offensive Actions Drill"
description: "1 attacker, 2 passers. Coach shoots off backboard, A rebounds, pivots and outlets to nearest passer. A moves to high post, receives at 3-point level, pivots face to basket. A chains: shot fake, drive fake, overhead pass to second passer. A cuts to opposite low post to receive and shoot."
court_type: half_court
court_standard: fiba
duration: 10m
intensity: 3
category: offense
tags:
  - interior
  - post-play
  - pivoting
  - passing
  - technique

sequences:
  - label: "Setup"
    instructions:
      - "1 attacker (A), 2 passers (B, C)"
      - "Coach at free throw line area"
      - "B on left wing, C on right wing"
      - "A under the basket"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.50, 0.12]
      - id: b1
        label: "B"
        role: attacker
        position: [0.15, 0.45]
      - id: c1
        label: "C"
        role: attacker
        position: [0.85, 0.45]
    accessories: []
    actions: []

  - label: "Rebound & Outlet"
    ball_carrier: a1
    instructions:
      - "Coach shoots off backboard"
      - "A rebounds, pivots and outlets to nearest passer (C)"
      - "A moves up to high post area"
      - "C passes back to A at 3-point level"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.50, 0.38]
      - id: b1
        label: "B"
        role: attacker
        position: [0.15, 0.45]
      - id: c1
        label: "C"
        role: attacker
        position: [0.85, 0.45]
    accessories: []
    actions:
      - type: pass
        from: a1
        to: c1
      - type: cut
        from: a1
        to: [0.50, 0.38]
      - type: pass
        from: c1
        to: a1

  - label: "Fakes & Finish"
    ball_carrier: a1
    instructions:
      - "A pivots face to basket, chains shot fake + drive fake"
      - "A makes overhead pass to B on the opposite wing"
      - "A cuts along the key edge to opposite low post"
      - "B passes to A at low post, A pivots and shoots"
      - "Variant: add defender on A"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.35, 0.20]
      - id: b1
        label: "B"
        role: attacker
        position: [0.15, 0.45]
    accessories: []
    actions:
      - type: pass
        from: a1
        to: b1
      - type: cut
        from: a1
        to: [0.35, 0.20]
      - type: pass
        from: b1
        to: a1
      - type: shot_jumpshot
        from: a1
        to: [0.50, 0.05]

i18n:
  fr:
    name: "Enchainement offensif du joueur interieur"
    description: "1 attaquant, 2 passeurs. L'entraineur tire contre la planche, A prend le rebond, pivote et fait une sortie de balle sur le passeur le plus proche. A monte au poste haut, recoit au niveau de la ligne a 3 points, pivote face au panier. A enchaine feinte de tir, feinte de depart, passe de renversement. A coupe au poste bas oppose pour recevoir et tirer."
    tags:
      - interieur
      - poste
      - pivot
      - passe
      - technique
    sequences:
      - label: "Mise en place"
        instructions:
          - "1 attaquant (A), 2 passeurs (B, C)"
          - "Coach a la ligne des lancers-francs"
          - "B sur l'aile gauche, C sur l'aile droite"
          - "A sous le panier"
      - label: "Rebond et sortie de balle"
        instructions:
          - "Le coach tire contre la planche"
          - "A prend le rebond, pivote et sort la balle sur le passeur le plus proche (C)"
          - "A monte au poste haut"
          - "C repasse a A au niveau de la ligne a 3 points"
      - label: "Feintes et finition"
        instructions:
          - "A pivote face au panier, enchaine feinte de tir + feinte de depart"
          - "A fait une passe de renversement a B sur l'aile opposee"
          - "A coupe en bordure de la raquette vers le poste bas oppose"
          - "B passe a A au poste bas, A pivote et tire"
          - "Variante : ajouter un defenseur sur A"
