name: "1v1 Layup Back-to-Back"
description: "2 players back-to-back at the free throw line circle, facing sidelines. 1 passer with ball. Coach throws ball to one side — that player becomes attacker, the other defender who must run around the circle first. Play until scored."
court_type: half_court
court_standard: fiba
duration: 10m
intensity: 3
category: offense
tags:
  - layup
  - 1v1
  - reaction
  - defense
  - competition

sequences:
  - label: "Setup"
    ball_carrier: p1
    instructions:
      - "2 players back-to-back at the top of the free throw circle"
      - "Facing the sidelines"
      - "1 passer (P) with ball at the top"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.45, 0.45]
      - id: b1
        label: "B"
        role: defender
        position: [0.55, 0.45]
      - id: p1
        label: "P"
        role: attacker
        position: [0.50, 0.20]
      - id: qa
        label: "A"
        role: attacker
        type: queue
        count: 3
        position: [0.40, 0.90]
      - id: qb
        label: "B"
        role: attacker
        type: queue
        count: 3
        position: [0.60, 0.90]
    accessories: []
    actions: []

  - label: "Reaction"
    ball_carrier: a1
    instructions:
      - "Coach throws ball to one side (left or right)"
      - "Player on ball side becomes attacker, must score a layup"
      - "Other player becomes defender, must run around the circle before defending"
      - "Play until the attacker scores"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.40, 0.30]
      - id: b1
        label: "B"
        role: defender
        position: [0.55, 0.35]
      - id: p1
        label: "P"
        role: attacker
        position: [0.50, 0.20]
    accessories: []
    actions:
      - type: pass
        from: p1
        to: a1
      - type: dribble
        from: a1
        to: [0.40, 0.15]
      - type: shot_layup
        from: a1
        to: [0.50, 0.05]

  - label: "Rotation"
    instructions:
      - "Attacker becomes passer, passer and defender rejoin queues"
      - "Rotation: A and B exchange roles each round"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.45, 0.45]
      - id: b1
        label: "B"
        role: defender
        position: [0.55, 0.45]
      - id: p1
        label: "P"
        role: attacker
        position: [0.50, 0.20]
    accessories: []
    actions: []

i18n:
  fr:
    name: "1c1 tir en course dos a dos"
    description: "2 joueurs dos a dos au cercle des lancers-francs, face aux lignes de touche. 1 passeur avec ballon. L'entraineur lance le ballon d'un cote — ce joueur devient attaquant, l'autre defenseur doit contourner le cercle avant de defendre. Jouer jusqu'au panier."
    tags:
      - tir-en-course
      - 1c1
      - reaction
      - defense
      - competition
    sequences:
      - label: "Mise en place"
        instructions:
          - "2 joueurs dos a dos au sommet du cercle des lancers-francs"
          - "Faces aux lignes de touche"
          - "1 passeur (P) avec ballon en haut"
      - label: "Reaction"
        instructions:
          - "L'entraineur lance le ballon d'un cote (gauche ou droite)"
          - "Le joueur cote ballon devient attaquant, doit marquer en tir en course"
          - "L'autre joueur devient defenseur, doit contourner le cercle avant de defendre"
          - "Jouer jusqu'au panier"
      - label: "Rotation"
        instructions:
          - "L'attaquant devient passeur, le passeur et le defenseur rejoignent les files"
          - "Rotation : A et B echangent les roles a chaque tour"
