name: "1v1 Grinder"
description: "Intense 1v1 drill from the wing with live defense"
court_type: half_court
court_standard: fiba
duration: 15m
intensity: 3
category: defense
tags:
  - 1v1
  - defense
  - offense
  - live
  - U13
  - U15

sequences:
  - label: "Setup"
    ball_carrier: a1
    instructions:
      - "Attacker on the wing with the ball"
      - "Defender face-guarding the attacker"
      - "Coach at the top of the key"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.15, 0.55]
      - id: d1
        label: "D"
        role: defender
        position: [0.22, 0.52]
      - id: coach
        label: "C"
        role: coach
        position: [0.50, 0.90]
    accessories:
      - type: cone
        id: acc1
        position: [0.15, 0.55]
    actions: []

  - label: "Live 1v1"
    ball_carrier: a1
    instructions:
      - "Coach says GO"
      - "A attacks the basket, D defends"
      - "Play is live until a score or a stop"
      - "Attacker has 10 seconds max"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.35, 0.30]
      - id: d1
        label: "D"
        role: defender
        position: [0.38, 0.35]
      - id: coach
        label: "C"
        role: coach
        position: [0.50, 0.90]
    accessories:
      - type: cone
        id: acc1
        position: [0.15, 0.55]
    actions:
      - type: dribble
        from: a1
        to: [0.45, 0.20]
      - type: close_out
        from: d1
        to: a1

i18n:
  fr:
    name: "1c1 Intensif"
    description: "Exercice de 1 contre 1 intense depuis l'aile avec defense active"
    tags:
      - 1c1
      - défense
      - attaque
      - actif
      - U13
      - U15
    sequences:
      - label: "Mise en place"
        instructions:
          - "Attaquant sur l'aile avec le ballon"
          - "Defenseur face a l'attaquant"
          - "Coach en haut de la raquette"
      - label: "1c1 actif"
        instructions:
          - "Le coach dit GO"
          - "A attaque le panier, D defend"
          - "Le jeu est actif jusqu'a un panier ou un arret"
          - "L'attaquant a 10 secondes maximum"
