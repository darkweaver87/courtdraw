name: "Trap Coordination Drill"
description: "1 attacker, 2 defenders in half court. The attacker tries to score while 2 defenders orient and trap him. Defenders work on coordinating the double team: feet together, arms up, force toward sideline. Develops trap timing and technique."
court_type: half_court
court_standard: fiba
duration: 8m
intensity: 4
category: defense
tags:
  - defense
  - trap
  - double-team
  - coordination
  - pressure

sequences:
  - label: "Setup"
    ball_carrier: a1
    instructions:
      - "Attacker (A) with ball at center of half court"
      - "Defender 1 (D1) in front, Defender 2 (D2) on the side"
      - "A tries to score as fast as possible"
      - "D1 and D2 coordinate to trap A"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.50, 0.50]
      - id: d1
        label: "D1"
        role: defender
        position: [0.50, 0.40]
      - id: d2
        label: "D2"
        role: defender
        position: [0.35, 0.45]
    accessories: []
    actions: []

  - label: "Orient & Trap"
    ball_carrier: a1
    instructions:
      - "D1 orients A toward the sideline (cuts off middle)"
      - "D2 waits for A to reach the trap zone"
      - "When A is near the sideline, D2 closes the trap"
      - "Feet together, arms up — no reaching"
      - "Don't try to steal — force a bad pass"
      - "If A scores, defenders stay; if turnover, A stays"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.25, 0.40]
      - id: d1
        label: "D1"
        role: defender
        position: [0.30, 0.38]
      - id: d2
        label: "D2"
        role: defender
        position: [0.22, 0.42]
    accessories: []
    actions:
      - type: dribble
        from: a1
        to: [0.25, 0.40]

  - label: "Trap with Rotation"
    ball_carrier: a1
    instructions:
      - "Add 2 receivers (B, C) and a 3rd defender"
      - "After the trap, A tries to pass to B or C"
      - "D3 positions to intercept the most likely pass"
      - "D3 reads A's eyes and body orientation"
      - "Defenders move during ball flight (not before)"
      - "Variant: use cones to mark the trap zones"
    players:
      - id: a1
        label: "A"
        role: attacker
        position: [0.20, 0.40]
      - id: b1
        label: "B"
        role: attacker
        position: [0.60, 0.30]
      - id: c1
        label: "C"
        role: attacker
        position: [0.50, 0.55]
      - id: d1
        label: "D1"
        role: defender
        position: [0.25, 0.38]
      - id: d2
        label: "D2"
        role: defender
        position: [0.18, 0.42]
      - id: d3
        label: "D3"
        role: defender
        position: [0.45, 0.40]
    accessories: []
    actions:
      - type: pass
        from: a1
        to: b1

i18n:
  fr:
    name: "Travail de coordination des trappes"
    description: "1 attaquant, 2 defenseurs sur demi-terrain. L'attaquant essaie de marquer tandis que les 2 defenseurs l'orientent et le trappent. Les defenseurs travaillent la coordination de la prise a deux : pieds colles, bras leves, pousser vers la ligne de touche. Travail du timing et de la technique de trappe."
    tags:
      - defense
      - trappe
      - prise-a-deux
      - coordination
      - pression
    sequences:
      - label: "Mise en place"
        instructions:
          - "Attaquant (A) avec ballon au centre du demi-terrain"
          - "Defenseur 1 (D1) devant, Defenseur 2 (D2) sur le cote"
          - "A essaie de marquer le plus vite possible"
          - "D1 et D2 coordonnent la prise a deux sur A"
      - label: "Orienter et trapper"
        instructions:
          - "D1 oriente A vers la ligne de touche (coupe le milieu)"
          - "D2 attend que A atteigne la zone de trappe"
          - "Quand A est pres de la touche, D2 ferme la trappe"
          - "Pieds colles, bras leves — pas de mains"
          - "Ne pas essayer de voler — forcer une mauvaise passe"
          - "Si A marque, les defenseurs restent ; si perte de balle, A reste"
      - label: "Trappe avec rotation"
        instructions:
          - "Ajouter 2 receveurs (B, C) et un 3eme defenseur"
          - "Apres la trappe, A essaie de passer a B ou C"
          - "D3 se positionne pour intercepter la passe la plus probable"
          - "D3 lit les yeux et l'orientation du corps de A"
          - "Les defenseurs bougent pendant le vol du ballon (pas avant)"
          - "Variante : utiliser des plots pour marquer les zones de trappe"
